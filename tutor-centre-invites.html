<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Genie - Tutor Centre Invites</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
  </style>
</head>
<body>
  <main id="app" class="min-h-screen p-4 md:p-8">
    <div class="flex min-h-screen items-center justify-center">
      <div class="text-center">
        <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600 mx-auto"></div>
        <p class="mt-4 text-gray-600">Loading tutor centre invites...</p>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById('app');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function inviteLink(code) {
      return `${window.location.origin}/connect-tutor-centre.html?code=${encodeURIComponent(code || '')}`;
    }

    function qrUrl(link) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(link)}`;
    }

    async function copyText(value, button) {
      try {
        await navigator.clipboard.writeText(value);
        const original = button.innerHTML;
        button.innerHTML = '<i data-lucide="check" class="h-4 w-4 mr-2"></i>Copied';
        lucide.createIcons();
        window.setTimeout(() => { button.innerHTML = original; lucide.createIcons(); }, 1600);
      } catch {
        alert('Could not copy. Please select and copy manually.');
      }
    }

    function renderShell(title, body, icon = 'graduation-cap', color = 'indigo') {
      app.innerHTML = `
        <div class="max-w-2xl mx-auto mt-16 bg-white p-8 rounded-xl shadow-xl text-center border-t-4 border-${color}-500">
          <i data-lucide="${icon}" class="mx-auto h-14 w-14 text-${color}-600"></i>
          <h1 class="mt-4 text-3xl font-bold text-gray-800">${escapeHtml(title)}</h1>
          <div class="mt-3 text-gray-600">${body}</div>
          <a href="/tutor-dashboard.html" class="inline-flex mt-6 bg-indigo-600 text-white font-semibold py-3 px-5 rounded-lg hover:bg-indigo-700">Back to Tutor Dashboard</a>
        </div>`;
      lucide.createIcons();
    }

    function renderInviteCard(centre) {
      const code = centre.invite_code || '';
      const link = inviteLink(code);
      const enabled = centre.invite_code_enabled !== false;
      return `
        <article class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
          <div class="p-6 border-t-4 border-indigo-500">
            <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-6">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-bold uppercase tracking-wide text-indigo-600">Tutor centre invite</p>
                <h2 class="mt-1 text-2xl font-bold text-gray-800">${escapeHtml(centre.tutor_centre_name || 'Tutor Centre')}</h2>
                <p class="mt-2 text-gray-600">Share this code or QR link with parents. They can connect their learner profile directly to your tutor centre.</p>

                <div class="mt-5 grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100">
                    <p class="text-xs font-bold uppercase tracking-wide text-indigo-500">Short code</p>
                    <span class="block mt-2 text-3xl font-bold tracking-wide text-indigo-900">${escapeHtml(code || 'No code')}</span>
                    <button type="button" data-copy-value="${escapeHtml(code)}" class="copy-btn mt-4 inline-flex items-center px-4 py-2 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700 disabled:bg-gray-300" ${code ? '' : 'disabled'}>
                      <i data-lucide="copy" class="h-4 w-4 mr-2"></i>Copy code
                    </button>
                  </div>

                  <div class="bg-violet-50 rounded-xl p-4 border border-violet-100">
                    <p class="text-xs font-bold uppercase tracking-wide text-violet-500">Invite link</p>
                    <p class="mt-2 text-sm text-violet-900 break-all">${escapeHtml(link)}</p>
                    <button type="button" data-copy-value="${escapeHtml(link)}" class="copy-btn mt-4 inline-flex items-center px-4 py-2 rounded-lg bg-violet-600 text-white font-semibold hover:bg-violet-700 disabled:bg-gray-300" ${code ? '' : 'disabled'}>
                      <i data-lucide="link" class="h-4 w-4 mr-2"></i>Copy link
                    </button>
                  </div>
                </div>

                <div class="mt-5 rounded-xl p-4 ${enabled ? 'bg-green-50 border border-green-100 text-green-800' : 'bg-amber-50 border border-amber-100 text-amber-800'}">
                  <div class="flex items-start gap-3">
                    <i data-lucide="${enabled ? 'check-circle' : 'alert-circle'}" class="h-5 w-5 mt-0.5"></i>
                    <p class="text-sm">${enabled ? 'This invite code is active.' : 'This invite code is currently disabled.'} Learners must be signed in with a paid account to connect.</p>
                  </div>
                </div>
              </div>

              <div class="w-full lg:w-[260px] bg-gray-50 rounded-2xl p-5 text-center border border-gray-100">
                ${code ? `<img src="${qrUrl(link)}" alt="QR code" class="w-[220px] h-[220px] mx-auto rounded-xl border border-white shadow-sm bg-white" />` : '<div class="w-[220px] h-[220px] mx-auto rounded-xl bg-gray-200 flex items-center justify-center text-gray-500">No QR code</div>'}
                <p class="mt-4 text-sm text-gray-600">Parents can scan this to open the connection page with your code pre-filled.</p>
              </div>
            </div>
          </div>
        </article>`;
    }

    function renderInvites(centres) {
      app.innerHTML = `
        <div class="max-w-6xl mx-auto space-y-6">
          <header class="bg-white rounded-2xl shadow-lg p-6 border-t-4 border-indigo-500">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              <div>
                <p class="text-sm font-semibold text-indigo-600 uppercase tracking-wide">LearnerGenie Tutor Centres</p>
                <h1 class="text-3xl font-bold text-gray-800">Invite learners to connect</h1>
                <p class="text-gray-500 mt-1">Share your tutor centre code, invite link or QR code with parents.</p>
              </div>
              <a href="/tutor-dashboard.html" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200">
                <i data-lucide="layout-dashboard" class="h-4 w-4 mr-2"></i>Back to dashboard
              </a>
            </div>
          </header>
          ${centres.map(renderInviteCard).join('')}
        </div>`;

      document.querySelectorAll('.copy-btn').forEach((button) => {
        button.addEventListener('click', () => copyText(button.dataset.copyValue || '', button));
      });
      lucide.createIcons();
    }

    async function initialiseInvitePage() {
      try {
        const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
        if (sessionError) throw sessionError;
        if (!sessionData?.session) {
          renderShell('Sign in first', '<p>Use the normal LearnerGenie login, then come back to share your tutor centre invite.</p>', 'lock', 'indigo');
          return;
        }

        const { data, error } = await supabaseClient.rpc('get_my_tutor_centres');
        if (error) throw error;

        const centres = (data || []).filter((centre) => centre.status === 'active');
        if (!centres.length) {
          renderShell('No tutor centre found', '<p>This account is not currently linked to an active tutor centre.</p>', 'graduation-cap', 'amber');
          return;
        }

        renderInvites(centres);
      } catch (error) {
        renderShell('Something went wrong', `<p>${escapeHtml(error.message || error)}</p>`, 'alert-triangle', 'rose');
      }
    }

    initialiseInvitePage();
  </script>
</body>
</html>
