<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Genie - Tutor Dashboard</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

    body {

    }

      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById('app');

    const tutorState = {
      session: null,
      centres: [],
      activeCentreId: null,
      learners: [],
      groups: [],
      groupMemberships: [],
      activity: [],
      filters: {
        dateRangeDays: 30,
        groupId: 'all',
        subject: 'all',
        search: ''
      },
      aiInsight: null,
      loadingInsight: false
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normaliseWhitespace(value) {
      return String(value ?? '').replace(/\s+/g, ' ').trim();
    }

    function truncateText(value, maxLength = 80) {
      const text = normaliseWhitespace(value);
      if (!text) return '—';
      return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
    }

    function displayLabel(value, maxLength = 42) {
      const text = normaliseWhitespace(value);
      if (!text || text === 'Unknown') return '—';
      return truncateText(text, maxLength);
    }

    function topicLabel(value, maxLength = 90) {
      const text = normaliseWhitespace(value);
      if (!text || text === 'Unknown') return 'No topic tagged';
      return truncateText(text, maxLength);
    }

    function formatDate(value) {
      if (!value) return 'Never';
      return new Intl.DateTimeFormat('en-ZA', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      }).format(new Date(value));
    }

    function daysAgo(value) {
      if (!value) return null;
      const diff = Date.now() - new Date(value).getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function countBy(items, getter) {
      return items.reduce((acc, item) => {
        const key = normaliseWhitespace(getter(item)) || 'Unknown';
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function topEntries(counts, limit = 5) {
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit);
    }

    function getActiveCentre() {
      return tutorState.centres.find((centre) => String(centre.id) === String(tutorState.activeCentreId));
    }

    function learnerGroups(profileId) {
      const groupIds = tutorState.groupMemberships
        .filter((membership) => Number(membership.profile_id) === Number(profileId))
        .map((membership) => Number(membership.tutor_group_id));

      return tutorState.groups.filter((group) => groupIds.includes(Number(group.id)));
    }

    function filteredLearners() {
      const search = tutorState.filters.search.trim().toLowerCase();
      const selectedGroupId = tutorState.filters.groupId;
      const selectedSubject = tutorState.filters.subject;
      const cutoff = new Date(Date.now() - tutorState.filters.dateRangeDays * 24 * 60 * 60 * 1000);

      return tutorState.learners.filter((learner) => {
        const learnerActivity = tutorState.activity.filter((item) => Number(item.profile_id) === Number(learner.id));
        const activityInRange = learnerActivity.filter((item) => new Date(item.created_at) >= cutoff);
        const matchesSearch = !search || learner.name.toLowerCase().includes(search);
        const matchesGroup = selectedGroupId === 'all' || learnerGroups(learner.id).some((group) => String(group.id) === String(selectedGroupId));
        const matchesSubject = selectedSubject === 'all' || activityInRange.some((item) => (item.subject || item.work_type || 'Unknown') === selectedSubject);
        return matchesSearch && matchesGroup && matchesSubject;
      });
    }

    function activityInDateRange() {
      const cutoff = new Date(Date.now() - tutorState.filters.dateRangeDays * 24 * 60 * 60 * 1000);
      const visibleLearnerIds = new Set(filteredLearners().map((learner) => Number(learner.id)));
      return tutorState.activity.filter((item) => visibleLearnerIds.has(Number(item.profile_id)) && new Date(item.created_at) >= cutoff);
    }

    function learnerActivitySummary(learner) {
      const items = tutorState.activity.filter((item) => Number(item.profile_id) === Number(learner.id));
      const latest = items[0]?.created_at || null;
      const subjectCounts = countBy(items, (item) => item.subject || item.work_type);
      const topicCounts = countBy(items, (item) => item.topic);
      return {
        latest,
        count: items.length,
        topSubject: topEntries(subjectCounts, 1)[0]?.[0] || '—',
        topTopic: topEntries(topicCounts, 1)[0]?.[0] || '—'
      };
    }

    function buildLocalInsight() {
      const learners = filteredLearners();
      const activity = activityInDateRange();
      const subjectTop = topEntries(countBy(activity, (item) => item.subject || item.work_type), 3);
      const topicTop = topEntries(countBy(activity, (item) => item.topic), 3);
      const inactive = learners.filter((learner) => {
        const latest = learnerActivitySummary(learner).latest;
        const inactiveDays = daysAgo(latest);
        return latest && inactiveDays >= 14;
      });
      const neverActive = learners.filter((learner) => !learnerActivitySummary(learner).latest);

      const subjectSentence = subjectTop.length
        ? `Most activity is currently around ${subjectTop.map(([name, count]) => `${displayLabel(name, 35)} (${count})`).join(', ')}.`
        : 'There is not enough recent activity to identify subject patterns yet.';

      const topicSentence = topicTop.length
        ? `Common topics include ${topicTop.map(([name, count]) => `${displayLabel(name, 45)} (${count})`).join(', ')}.`
        : 'Topic data is still thin; this will improve as saved work gets tagged.';

      const attention = [];
      if (inactive.length) attention.push(`${inactive.length} learner${inactive.length === 1 ? '' : 's'} have not been active for at least 14 days.`);
      if (neverActive.length) attention.push(`${neverActive.length} learner${neverActive.length === 1 ? '' : 's'} have no saved activity yet.`);
      if (!attention.length) attention.push('No major inactivity warning for the current filtered view.');

      return {
        summary: `${subjectSentence} ${topicSentence}`,
        attention,
        suggestedActions: [
          subjectTop[0] ? `Plan a focused support session around ${displayLabel(subjectTop[0][0], 45)}.` : 'Encourage learners to complete a few activities so the dashboard has enough data.',
          topicTop[0] ? `Review learners working repeatedly on ${displayLabel(topicTop[0][0], 55)}.` : 'Start tagging saved work with topics for better reports.',
          inactive.length || neverActive.length ? 'Follow up with inactive learners or their parents.' : 'Use groups to organise learners by grade, subject, or language.'
        ]
      };
    }

    function safeParseJson(text) {
      try { return JSON.parse(text); } catch { return null; }
    }

    function extractGeminiText(responseBody) {
      return responseBody?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    function normaliseInsightOutput(rawText) {
      const parsed = typeof rawText === 'string' ? safeParseJson(rawText) : rawText;
      if (parsed && typeof parsed === 'object') return parsed;
      return {
        summary: rawText || 'No insight returned.',
        attention: [],
        suggestedActions: []
      };
    }

    function dashboardDatasetForAi() {
      const learners = filteredLearners();
      const activity = activityInDateRange();
      const subjectCounts = countBy(activity, (item) => item.subject || item.work_type);
      const topicCounts = countBy(activity, (item) => item.topic);
      const workTypeCounts = countBy(activity, (item) => item.work_type);
      const learnerRows = learners.map((learner) => {
        const summary = learnerActivitySummary(learner);
        return {
          learner_name: learner.name,
          groups: learnerGroups(learner.id).map((group) => group.name),
          activity_count: summary.count,
          last_active: summary.latest,
          top_subject: summary.topSubject,
          top_topic: summary.topTopic
        };
      });

      return {
        date_range_days: tutorState.filters.dateRangeDays,
        learner_count: learners.length,
        activity_count: activity.length,
        subjects: subjectCounts,
        topics: topicCounts,
        work_types: workTypeCounts,
        learners: learnerRows
      };
    }

    async function generateAiInsight() {
      tutorState.loadingInsight = true;
      renderTutorDashboard();

      const dataset = dashboardDatasetForAi();
      const prompt = `You are helping a tutor understand learner activity in Learning Genie.\n\nUse the dataset below to produce a concise tutor insight. Return valid JSON only with these fields: summary, common_subjects, common_topics, attention, suggested_actions.\n\nRules:\n- Be practical and specific.\n- Do not invent data.\n- Mention when data is limited.\n- Keep the summary under 120 words.\n- Do not include long raw topic strings. Summarise repeated long topics into short labels.\n\nDataset:\n${JSON.stringify(dataset, null, 2)}`;

      try {
        const response = await fetch('/.netlify/functions/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requestType: 'tutorInsight', prompt, isJson: true })
        });

        const responseBody = await response.json();
        if (!response.ok) throw new Error(responseBody.error || 'Could not generate insight.');

        const rawText = extractGeminiText(responseBody);
        tutorState.aiInsight = normaliseInsightOutput(rawText);
      } catch (error) {
        tutorState.aiInsight = {
          summary: `AI insight could not be generated: ${error.message}`,
          attention: [],
          suggestedActions: []
        };
      } finally {
        tutorState.loadingInsight = false;
        renderTutorDashboard();
      }
    }

    async function loadTutorMemberships() {
      const { data, error } = await supabaseClient
        .from('tutor_centre_users')
        .select('id, tutor_centre_id, role, status, tutor_centres(id, name, description, contact_email, status)')
        .eq('status', 'active');

      if (error) throw error;

      tutorState.centres = (data || [])
        .map((row) => ({ membershipId: row.id, role: row.role, ...row.tutor_centres }))
        .filter((centre) => centre && centre.status === 'active');

      tutorState.activeCentreId = tutorState.activeCentreId || tutorState.centres[0]?.id || null;
    }

    async function loadTutorDashboardData() {
      const activeCentreId = tutorState.activeCentreId;
      if (!activeCentreId) return;

      const [{ data: assignments, error: assignmentError }, { data: groups, error: groupError }] = await Promise.all([
        supabaseClient
          .from('tutor_centre_profiles')
          .select('profile_id, status, profiles(id, name, avatar_key, grade, language, school)')
          .eq('tutor_centre_id', activeCentreId)
          .eq('status', 'active'),
        supabaseClient
          .from('tutor_groups')
          .select('id, tutor_centre_id, name, group_type, description, created_at')
          .eq('tutor_centre_id', activeCentreId)
          .order('name')
      ]);

      if (assignmentError) throw assignmentError;
      if (groupError) throw groupError;

      tutorState.learners = (assignments || [])
        .map((assignment) => assignment.profiles)
        .filter(Boolean)
        .sort((a, b) => a.name.localeCompare(b.name));

      tutorState.groups = groups || [];
      const learnerIds = tutorState.learners.map((learner) => learner.id);

      if (!learnerIds.length) {
        tutorState.activity = [];
        tutorState.groupMemberships = [];
        return;
      }

      const [{ data: activity, error: activityError }, { data: memberships, error: membershipsError }] = await Promise.all([
        supabaseClient
          .from('saved_work')
          .select('id, profile_id, work_type, subject, topic, language, metadata, input_prompt, output_content, created_at')
          .in('profile_id', learnerIds)
          .order('created_at', { ascending: false })
          .limit(500),
        supabaseClient
          .from('tutor_group_profiles')
          .select('id, tutor_group_id, profile_id, created_at')
          .in('profile_id', learnerIds)
      ]);

      if (activityError) throw activityError;
      if (membershipsError) throw membershipsError;

      tutorState.activity = activity || [];
      tutorState.groupMemberships = memberships || [];
    }

    function renderNoAccess() {
      app.innerHTML = `
        <div class="max-w-2xl mx-auto mt-16 bg-white p-8 rounded-xl shadow-xl text-center border-t-4 border-amber-400">
          <i data-lucide="graduation-cap" class="mx-auto h-14 w-14 text-amber-500"></i>
          <h1 class="mt-4 text-3xl font-bold text-gray-800">Tutor View is not active for this account</h1>
          <p class="mt-3 text-gray-600">This login is not currently linked to an active tutor centre. Use the normal LearnerGenie app, or ask the administrator to link this account to a tutor centre.</p>
          <a href="/app.html" class="inline-flex mt-6 bg-indigo-600 text-white font-semibold py-3 px-5 rounded-lg hover:bg-indigo-700">Back to LearnerGenie</a>
        </div>
      `;
      lucide.createIcons();
    }

    function renderNotSignedIn() {
      app.innerHTML = `
        <div class="max-w-2xl mx-auto mt-16 bg-white p-8 rounded-xl shadow-xl text-center border-t-4 border-indigo-500">
          <i data-lucide="lock" class="mx-auto h-14 w-14 text-indigo-600"></i>
          <h1 class="mt-4 text-3xl font-bold text-gray-800">Sign in first</h1>
          <p class="mt-3 text-gray-600">Tutor Dashboard uses the same secure login as LearnerGenie. Sign in through the main app, then open Tutor View again.</p>
          <a href="/app.html" class="inline-flex mt-6 bg-indigo-600 text-white font-semibold py-3 px-5 rounded-lg hover:bg-indigo-700">Go to login</a>
        </div>
      `;
      lucide.createIcons();
    }

    function renderError(error) {
      app.innerHTML = `
        <div class="max-w-2xl mx-auto mt-16 bg-white p-8 rounded-xl shadow-xl border-t-4 border-rose-500">
          <div class="flex items-center gap-3">
            <i data-lucide="alert-triangle" class="h-8 w-8 text-rose-500"></i>
            <h1 class="text-2xl font-bold text-gray-800">Something went wrong</h1>
          </div>
          <p class="mt-4 text-gray-600">${escapeHtml(error.message || error)}</p>
          <button id="retry-btn" class="mt-6 bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700">Retry</button>
        </div>
      `;
      document.getElementById('retry-btn')?.addEventListener('click', initialiseTutorDashboard);
      lucide.createIcons();
    }

    function metricCard(label, title, value, icon) {
      const rawValue = normaliseWhitespace(value);
      return `
        <div class="bg-white rounded-xl shadow-lg p-5 border border-gray-100 min-h-[135px]">
          <div class="flex items-center justify-between">
            <p class="text-xs font-bold uppercase tracking-wide text-gray-500">${escapeHtml(label)}</p>
            <i data-lucide="${icon}" class="h-5 w-5 text-indigo-500"></i>
          </div>
          <div class="mt-3 text-2xl font-bold text-gray-800 leading-tight clamp-2" title="${escapeHtml(rawValue)}">${escapeHtml(displayLabel(rawValue, 34))}</div>
          <p class="mt-2 text-sm text-gray-500">${escapeHtml(title)}</p>
        </div>
      `;
    }

    function renderTutorDashboard() {
      const centre = getActiveCentre();
      const learners = filteredLearners();
      const activity = activityInDateRange();
      const subjects = topEntries(countBy(tutorState.activity, (item) => item.subject || item.work_type), 20);
      const activeLearnerIds = new Set(activity.map((item) => Number(item.profile_id)));
      const topSubject = topEntries(countBy(activity, (item) => item.subject || item.work_type), 1)[0]?.[0] || '—';
      const topTopic = topEntries(countBy(activity, (item) => item.topic), 1)[0]?.[0] || '—';
      const localInsight = buildLocalInsight();
      const insight = tutorState.aiInsight || localInsight;
      const insightSummary = truncateText(insight.summary || 'No insight available yet.', 320);

      app.innerHTML = `
        <div class="max-w-7xl mx-auto space-y-6">
          <header class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-indigo-500">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <div>
                <p class="text-sm font-semibold text-indigo-600 uppercase tracking-wide">Tutor Dashboard</p>
                <h1 class="text-3xl font-bold text-gray-800">${escapeHtml(centre?.name || 'Tutor Centre')}</h1>
                <p class="text-gray-500 mt-1">View assigned learners, activity patterns, groups, and tutor insights.</p>
              </div>
              <div class="flex flex-wrap gap-3">
                ${tutorState.centres.length > 1 ? `<select id="centre-select" class="px-3 py-2 border border-gray-300 rounded-lg bg-white">${tutorState.centres.map((item) => `<option value="${item.id}" ${String(item.id) === String(tutorState.activeCentreId) ? 'selected' : ''}>${escapeHtml(item.name)}</option>`).join('')}</select>` : ''}
                <a href="/app.html" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200">Learner App</a>
              </div>
            </div>
          </header>

          <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            ${metricCard('Users', 'Assigned learners', learners.length, 'users')}
            ${metricCard('Activity', `Active in last ${tutorState.filters.dateRangeDays} days`, activeLearnerIds.size, 'pulse')}
            ${metricCard('Saved work', 'Activities in view', activity.length, 'archive')}
            ${metricCard('Top subject', 'Most used subject/tool', topSubject, 'book-open')}
            ${metricCard('Focus', 'Most common topic', displayLabel(topTopic, 34), 'target')}
          </section>

          <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-lg p-6 border-t-4 border-amber-400">
              <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                <div>
                  <h2 class="text-2xl font-bold text-gray-800">Tutor Insight</h2>
                  <p class="text-gray-500 text-sm mt-1">A summary of what your assigned learners are working on.</p>
                </div>
                <button id="generate-ai-insight-btn" class="px-4 py-2 rounded-lg bg-amber-500 text-white font-semibold hover:bg-amber-600 disabled:bg-amber-300" ${tutorState.loadingInsight ? 'disabled' : ''}>${tutorState.loadingInsight ? 'Generating...' : 'Generate AI insight'}</button>
              </div>
              <p class="mt-5 text-gray-700 leading-relaxed" title="${escapeHtml(insight.summary || '')}">${escapeHtml(insightSummary)}</p>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-5">
                <div class="bg-amber-50 rounded-lg p-4">
                  <h3 class="font-bold text-gray-800 mb-2">Needs attention</h3>
                  <ul class="space-y-2 text-sm text-gray-700 list-disc pl-5">${(insight.attention || insight.suggested_actions || []).slice(0, 4).map((item) => `<li title="${escapeHtml(item)}">${escapeHtml(truncateText(item, 95))}</li>`).join('') || '<li>No attention items yet.</li>'}</ul>
                </div>
                <div class="bg-indigo-50 rounded-lg p-4">
                  <h3 class="font-bold text-gray-800 mb-2">Suggested next steps</h3>
                  <ul class="space-y-2 text-sm text-gray-700 list-disc pl-5">${(insight.suggestedActions || insight.suggested_actions || []).slice(0, 4).map((item) => `<li title="${escapeHtml(item)}">${escapeHtml(truncateText(item, 95))}</li>`).join('') || '<li>Generate an AI insight for suggested actions.</li>'}</ul>
                </div>
              </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6 border-t-4 border-indigo-500">
              <h2 class="text-xl font-bold text-gray-800">Top subjects/tools</h2>
              <div class="mt-4 space-y-3">
                ${topEntries(countBy(activity, (item) => item.subject || item.work_type), 6).map(([name, count]) => `<div><div class="flex justify-between gap-3 text-sm font-medium text-gray-700"><span class="truncate" title="${escapeHtml(name)}">${escapeHtml(displayLabel(name, 36))}</span><span>${count}</span></div><div class="mt-1 h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-indigo-500" style="width: ${Math.min(100, count / Math.max(1, activity.length) * 100)}%"></div></div></div>`).join('') || '<p class="text-gray-500 text-sm">No activity in this view yet.</p>'}
              </div>
            </div>
          </section>

          <section class="bg-white rounded-xl shadow-lg p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div><label class="block text-sm font-semibold text-gray-700 mb-1">Search learner</label><input id="search-input" value="${escapeHtml(tutorState.filters.search)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="Type a name..." /></div>
              <div><label class="block text-sm font-semibold text-gray-700 mb-1">Date range</label><select id="date-range-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white">${[7, 30, 90, 365].map((days) => `<option value="${days}" ${Number(tutorState.filters.dateRangeDays) === days ? 'selected' : ''}>Last ${days} days</option>`).join('')}</select></div>
              <div><label class="block text-sm font-semibold text-gray-700 mb-1">Group</label><select id="group-filter-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white"><option value="all">All groups</option>${tutorState.groups.map((group) => `<option value="${group.id}" ${String(tutorState.filters.groupId) === String(group.id) ? 'selected' : ''}>${escapeHtml(group.name)}</option>`).join('')}</select></div>
              <div><label class="block text-sm font-semibold text-gray-700 mb-1">Subject/tool</label><select id="subject-filter-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white"><option value="all">All subjects/tools</option>${subjects.map(([subject]) => `<option value="${escapeHtml(subject)}" ${tutorState.filters.subject === subject ? 'selected' : ''}>${escapeHtml(displayLabel(subject, 45))}</option>`).join('')}</select></div>
            </div>
          </section>

          <section class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="xl:col-span-2 bg-white rounded-xl shadow-lg overflow-hidden">
              <div class="p-6 border-b border-gray-100"><h2 class="text-2xl font-bold text-gray-800">Learners</h2><p class="text-gray-500 text-sm mt-1">Showing ${learners.length} learner${learners.length === 1 ? '' : 's'} in the current view.</p></div>
              <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-100 table-fixed">
                  <thead class="bg-gray-50"><tr><th class="w-1/5 px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Learner</th><th class="w-1/5 px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Groups</th><th class="w-[130px] px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Last active</th><th class="w-[110px] px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Activities</th><th class="w-2/5 px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Focus</th></tr></thead>
                  <tbody class="bg-white divide-y divide-gray-100">${learners.map(renderLearnerRow).join('') || `<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No learners match this view.</td></tr>`}</tbody>
                </table>
              </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-6">
              <h2 class="text-2xl font-bold text-gray-800">Recent activity</h2>
              <div class="mt-4 space-y-4 max-h-[620px] overflow-y-auto pr-2">${activity.slice(0, 12).map(renderRecentActivityItem).join('') || '<p class="text-gray-500 text-sm">No recent activity in this view.</p>'}</div>
            </div>
          </section>
        </div>
      `;

      document.getElementById('centre-select')?.addEventListener('change', async (event) => { tutorState.activeCentreId = event.target.value; tutorState.aiInsight = null; await loadTutorDashboardData(); renderTutorDashboard(); });
      document.getElementById('generate-ai-insight-btn')?.addEventListener('click', generateAiInsight);
      document.getElementById('search-input')?.addEventListener('input', (event) => { tutorState.filters.search = event.target.value; tutorState.aiInsight = null; renderTutorDashboard(); });
      document.getElementById('date-range-select')?.addEventListener('change', (event) => { tutorState.filters.dateRangeDays = Number(event.target.value); tutorState.aiInsight = null; renderTutorDashboard(); });
      document.getElementById('group-filter-select')?.addEventListener('change', (event) => { tutorState.filters.groupId = event.target.value; tutorState.aiInsight = null; renderTutorDashboard(); });
      document.getElementById('subject-filter-select')?.addEventListener('change', (event) => { tutorState.filters.subject = event.target.value; tutorState.aiInsight = null; renderTutorDashboard(); });
      lucide.createIcons();
    }

    function renderLearnerRow(learner) {
      const summary = learnerActivitySummary(learner);
      const groups = learnerGroups(learner.id);
      return `<tr class="hover:bg-indigo-50/40"><td class="px-6 py-4 align-top"><div class="font-semibold text-gray-800 truncate" title="${escapeHtml(learner.name)}">${escapeHtml(learner.name)}</div><div class="text-xs text-gray-500 truncate" title="${escapeHtml([learner.grade, learner.language, learner.school].filter(Boolean).join(' · '))}">${[learner.grade, learner.language, learner.school].filter(Boolean).map(escapeHtml).join(' · ') || 'No learner metadata yet'}</div></td><td class="px-6 py-4 align-top"><div class="flex flex-wrap gap-1">${groups.slice(0, 3).map((group) => `<span class="inline-flex px-2 py-1 rounded-full bg-indigo-50 text-indigo-700 text-xs font-semibold" title="${escapeHtml(group.name)}">${escapeHtml(displayLabel(group.name, 18))}</span>`).join('') || '<span class="text-gray-400 text-sm">No groups</span>'}</div></td><td class="px-6 py-4 align-top whitespace-nowrap text-sm text-gray-600">${formatDate(summary.latest)}</td><td class="px-6 py-4 align-top whitespace-nowrap text-sm font-semibold text-gray-700">${summary.count}</td><td class="px-6 py-4 align-top text-sm text-gray-600"><div class="font-medium truncate" title="${escapeHtml(summary.topSubject)}">${escapeHtml(displayLabel(summary.topSubject, 36))}</div><div class="text-xs text-gray-400 clamp-2" title="${escapeHtml(summary.topTopic)}">${escapeHtml(topicLabel(summary.topTopic, 90))}</div></td></tr>`;
    }

    function renderRecentActivityItem(item) {
      const learner = tutorState.learners.find((profile) => Number(profile.id) === Number(item.profile_id));
      const label = item.subject || item.work_type || 'Activity';
      const topic = item.topic || 'No topic tagged';
      return `<div class="border-l-4 border-indigo-200 pl-4 py-1"><div class="flex items-start justify-between gap-3"><div class="min-w-0 flex-1"><p class="font-semibold text-gray-800 truncate" title="${escapeHtml(learner?.name || 'Learner')}">${escapeHtml(learner?.name || 'Learner')}</p><p class="text-sm text-gray-600"><span class="font-medium" title="${escapeHtml(label)}">${escapeHtml(displayLabel(label, 26))}</span><span class="text-gray-400"> · </span><span class="clamp-2" title="${escapeHtml(topic)}">${escapeHtml(topicLabel(topic, 110))}</span></p></div><span class="text-xs text-gray-400 whitespace-nowrap">${formatDate(item.created_at)}</span></div></div>`;
    }

    async function initialiseTutorDashboard() {
      try {
        app.innerHTML = `<div class="flex min-h-screen items-center justify-center"><div class="text-center"><div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600 mx-auto"></div><p class="mt-4 text-gray-600">Loading Tutor Dashboard...</p></div></div>`;
        const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
        if (sessionError) throw sessionError;
        tutorState.session = sessionData?.session || null;
        if (!tutorState.session) { renderNotSignedIn(); return; }
        await loadTutorMemberships();
        if (!tutorState.centres.length) { renderNoAccess(); return; }
        await loadTutorDashboardData();
        renderTutorDashboard();
      } catch (error) {
        renderError(error);
      }
    }

    initialiseTutorDashboard();
  </script>
</body>
</html>
