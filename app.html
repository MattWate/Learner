<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Genie - Learner Hub</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
        .quiz-question-wrapper.correct { border-left: 4px solid #22c55e; background-color: #f0fdf4; }
        .quiz-question-wrapper.incorrect { border-left: 4px solid #ef4444; background-color: #fef2f2; }
        .quiz-feedback { display: none; font-size: 0.875rem; margin-top: 0.75rem; }
        .correct .quiz-feedback.correct { display: block; color: #166534; }
        .incorrect .quiz-feedback.incorrect { display: block; color: #991b1b; }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen">
        <div id="loading-spinner" class="flex items-center justify-center min-h-screen">
             <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            session: null, accountData: null, activeProfile: null, activeTab: 'home',
            uploadedImageBase64: null, currentTest: null
        };

        // --- NAVIGATION HANDLER ---
        document.addEventListener('click', (e) => {
            const navLink = e.target.closest('[data-nav-link]');
            if (navLink) {
                state.activeTab = navLink.dataset.navLink;
                renderToolContent();
            }
        });

        // --- RENDER FUNCTIONS ---
        function renderToolContent() {
            const main = document.getElementById('main-content');
            if (!main) return;

            const templates = {
                home: homePageTemplate(),
                mathsMastery: mathsMasteryTemplate,
                learningHub: learningHubTemplate,
                homeworkHelper: homeworkHelperTemplate,
                explainSimply: explainSimplyTemplate,
                testBuilder: testBuilderTemplate,
                myActivity: myActivityTemplate()
            };

            main.innerHTML = templates[state.activeTab] || templates.home;
            if (state.activeTab === 'myActivity') loadActivity();
            lucide.createIcons();
        }

        function homePageTemplate() {
            return `
            <div class="max-w-4xl mx-auto text-center space-y-10">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h1 class="text-4xl font-bold text-gray-800">Hi ${state.activeProfile.name}!</h1>
                    <p class="mt-2 text-gray-600">Pick a tool to start learning.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${toolCard('mathsMastery', 'calculator', 'blue', 'Maths Mastery', 'Step-by-step math solver.')}
                    ${toolCard('learningHub', 'book-marked', 'indigo', 'Learning Hub', 'Notes & practice tests.')}
                    ${toolCard('homeworkHelper', 'life-buoy', 'rose', 'Homework Helper', 'Hints for your worksheets.')}
                    ${toolCard('explainSimply', 'baby', 'amber', 'Explain Simply', 'Complex topics made easy.')}
                    ${toolCard('testBuilder', 'clipboard-check', 'teal', 'Test Builder', 'Create custom quizzes.')}
                </div>
            </div>`;
        }

        function toolCard(id, icon, color, title, desc) {
            return `
            <div data-nav-link="${id}" class="bg-white p-6 rounded-xl shadow cursor-pointer border-t-4 border-${color}-500 hover:shadow-lg transition-all">
                <i data-lucide="${icon}" class="h-10 w-10 text-${color}-600 mb-4 mx-auto"></i>
                <h3 class="text-xl font-bold">${title}</h3>
                <p class="text-sm text-gray-500">${desc}</p>
            </div>`;
        }

        const mathsMasteryTemplate = `
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-xl border-t-4 border-blue-500">
                <h2 class="text-2xl font-bold mb-4">Maths Mastery</h2>
                <textarea id="math-input" class="w-full p-4 border rounded-lg mb-4" placeholder="Type equation here..."></textarea>
                <button onclick="handleMathsMastery()" id="math-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Solve Problem</button>
                <div id="math-output" class="mt-6 space-y-4"></div>
            </div>`;

        // (Learning Hub, Homework Helper, etc. templates follow same pattern)
        const learningHubTemplate = `<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow border-t-4 border-indigo-500">
            <h2 class="text-2xl font-bold mb-4">Learning Hub</h2>
            <input id="lh-input" class="w-full p-4 border rounded-lg mb-4" placeholder="Topic name...">
            <button onclick="handleLearningHub()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg">Generate Guide</button>
            <div id="lh-output" class="mt-6"></div>
        </div>`;

        const homeworkHelperTemplate = `<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow border-t-4 border-rose-500">
            <h2 class="text-2xl font-bold mb-4">Homework Helper</h2>
            <textarea id="hh-input" class="w-full p-4 border rounded-lg mb-4" placeholder="Describe the problem..."></textarea>
            <button onclick="handleHomeworkHelper()" class="w-full bg-rose-600 text-white font-bold py-3 rounded-lg">Get Help</button>
            <div id="hh-output" class="mt-6"></div>
        </div>`;

        const explainSimplyTemplate = `<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow border-t-4 border-amber-500">
            <h2 class="text-2xl font-bold mb-4">Explain It Simply</h2>
            <input id="es-input" class="w-full p-4 border rounded-lg mb-4" placeholder="What should I explain?">
            <button onclick="handleExplainSimply()" class="w-full bg-amber-500 text-white font-bold py-3 rounded-lg">Explain</button>
            <div id="es-output" class="mt-6 prose"></div>
        </div>`;

        const testBuilderTemplate = `<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow border-t-4 border-teal-500">
            <h2 class="text-2xl font-bold mb-4">Test Builder</h2>
            <input id="tb-input" class="w-full p-4 border rounded-lg mb-4" placeholder="Test topic...">
            <button onclick="handleTestBuilder()" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg">Generate Test</button>
            <div id="tb-output" class="mt-6"></div>
        </div>`;

        function myActivityTemplate() {
            return `<div class="max-w-4xl mx-auto"><h2 class="text-2xl font-bold mb-6">Your History</h2><div id="activity-list" class="space-y-4"></div></div>`;
        }

        // --- LOGIC HANDLERS ---
        async function fetchAI(prompt, isJson) {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, isJson })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            return data.candidates[0].content.parts[0].text;
        }

        async function handleMathsMastery() {
            const input = document.getElementById('math-input').value;
            const output = document.getElementById('math-output');
            const btn = document.getElementById('math-btn');
            if (!input) return;

            btn.disabled = true; btn.innerText = "Solving...";
            try {
                const prompt = `Solve this math problem. Return ONLY a JSON object: {"steps": ["Step 1 text", "Step 2 text"], "final_answer": "the result"}. Problem: ${input}`;
                const text = await fetchAI(prompt, true);
                const res = JSON.parse(text);

                output.innerHTML = `
                    <div class="bg-blue-50 p-6 rounded-lg border-l-4 border-blue-500">
                        <h3 class="font-bold mb-2">Steps:</h3>
                        <ol class="list-decimal ml-5 mb-4">${res.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                        <div class="font-bold text-xl text-blue-800">Final Answer: ${res.final_answer}</div>
                    </div>`;
                
                await saveWork('mathsMastery', input, res);
            } catch (e) { output.innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`; }
            btn.disabled = false; btn.innerText = "Solve Problem";
        }

        // (Other logic handlers for Hub, Test, etc follow similar saveWork pattern)
        async function handleExplainSimply() {
            const input = document.getElementById('es-input').value;
            const output = document.getElementById('es-output');
            const prompt = `Explain "${input}" very simply for a child.`;
            const text = await fetchAI(prompt, false);
            output.innerHTML = text;
            await saveWork('explainSimply', input, { text });
        }

        async function saveWork(type, input, content) {
            await supabaseClient.from('saved_work').insert({
                profile_id: state.activeProfile.id,
                work_type: type,
                input_prompt: { prompt: input },
                output_content: content
            });
        }

        async function loadActivity() {
            const { data } = await supabaseClient.from('saved_work').select('*').eq('profile_id', state.activeProfile.id).order('created_at', { ascending: false });
            const list = document.getElementById('activity-list');
            if (!data || data.length === 0) { list.innerHTML = "No history found."; return; }
            list.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded shadow flex justify-between">
                    <div><span class="font-bold uppercase text-xs text-indigo-500">${item.work_type}</span>: ${item.input_prompt.prompt}</div>
                    <div class="text-gray-400 text-xs">${new Date(item.created_at).toLocaleDateString()}</div>
                </div>`).join('');
        }

        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="flex h-screen">
                    <aside class="w-64 bg-white border-r p-6 flex flex-col space-y-2">
                        <button data-nav-link="home" class="p-2 hover:bg-gray-100 rounded text-left">Dashboard</button>
                        <button data-nav-link="myActivity" class="p-2 hover:bg-gray-100 rounded text-left">History</button>
                        <button onclick="supabaseClient.auth.signOut()" class="mt-auto p-2 text-red-500 text-left">Logout</button>
                    </aside>
                    <main id="main-content" class="flex-1 p-10 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        // --- AUTH INIT ---
        supabaseClient.auth.getSession().then(({data: {session}}) => {
            if (!session) window.location.href = '/login.html';
            else {
                state.session = session;
                supabaseClient.from('profiles').select('*').eq('account_id', session.user.id).limit(1).single().then(({data}) => {
                    if (data) { state.activeProfile = data; showMainApp(); }
                    else window.location.href = '/login.html';
                });
            }
        });
    </script>
</body>
</html>
