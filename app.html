        const homeworkHelperTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500 print:hidden">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Homework Helper</h2>

                    <div class="space-y-6">

                            <label for="hh-question" class="block text-sm font-medium text-gray-700 mb-1">Enter your question</label>

                <div id="hh-output" class="mt-8"></div>
            </div>`;
        
        const learningHubTemplate = `
             <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500 print:hidden">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Learning Hub</h2>

                        </div>

        const explainSimplyTemplate = `
            <div class="max-w-4xl mx-auto">

                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Explain It Simply</h2>

                    <div id="es-error" class="text-red-500 text-sm mt-2 hidden"></div>

        const testBuilderTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-teal-500 print:hidden">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Test Builder</h2>

                            <textarea id="tb-topic" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., World War 2 Key Battles"></textarea>

                                <label class="flex items-center"><input type="checkbox" id="tb-qt-mcq" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked> <span class="ml-2 text-sm text-gray-700">Multiple Choice</span></label>
                                <label class="flex items-center"><input type="checkbox" id="tb-qt-tf" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked> <span class="ml-2 text-sm text-gray-700">True/False</span></label>
                                <label class="flex items-center"><input type="checkbox" id="tb-qt-short" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked> <span class="ml-2 text-sm text-gray-700">Short Answer</span></label>

                    <div id="tb-error" class="text-red-500 text-sm mt-2 mb-6 hidden"></div>
                </div>

        const myActivityTemplate = () => `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">My Activity</h2>
                    <p class="text-gray-500 mb-8">Here's a list of your past work for ${state.activeProfile.name}.</p>
                </div>
                <div id="my-activity-output" class="mt-8 space-y-6"></div>
            </div>`;

        const upgradeTemplate = () => `
            <div class="max-w-4xl mx-auto p-8 bg-white rounded-xl shadow-xl border-t-4 border-indigo-500 text-center">
                <i data-lucide="zap" class="mx-auto h-16 w-16 text-indigo-500 mb-4"></i>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Upgrade Now</h1>
                <p class="text-lg text-gray-600 mb-8">Unlock unlimited tools and profiles.</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="p-6 border rounded-xl hover:shadow-lg transition">
                        <h3 class="font-bold text-xl">Single</h3>
                        <p class="text-2xl font-bold text-indigo-600 my-4">R69/mo</p>
                        <button data-plan="paid_single" class="upgrade-btn w-full bg-indigo-600 text-white py-2 rounded-lg">Select</button>
                    </div>
                    <div class="p-6 border-2 border-indigo-500 rounded-xl bg-indigo-50 shadow-lg relative">
                        <span class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-indigo-500 text-white px-3 py-1 text-xs rounded-full">BEST VALUE</span>
                        <h3 class="font-bold text-xl">Family</h3>
                        <p class="text-2xl font-bold text-indigo-600 my-4">R99/mo</p>
                        <button data-plan="paid_family" class="upgrade-btn w-full bg-indigo-600 text-white py-2 rounded-lg">Select</button>
                    </div>
                    <div class="p-6 border rounded-xl hover:shadow-lg transition">
                        <h3 class="font-bold text-xl">Ultra</h3>
                        <p class="text-2xl font-bold text-indigo-600 my-4">R149/mo</p>
                        <button data-plan="paid_ultra" class="upgrade-btn w-full bg-indigo-600 text-white py-2 rounded-lg">Select</button>
                    </div>
                </div>
            </div>`;

        // --- UTILITY FUNCTIONS ---
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function renderPracticeTest(testData) {
            if (!testData || testData.length === 0) return "<p>No questions generated.</p>";
            let html = '<form id="quiz-form" class="space-y-6">';
            testData.forEach((question, index) => {
                html += `<div id="question-block-${index}" class="quiz-question-wrapper border-l-4 border-gray-200 p-4 rounded-r-lg">`;
                html += `<p class="font-semibold text-gray-800 mb-3">${index + 1}. ${question.question}</p><div class="space-y-2">`;
                if (question.type === 'MCQ' || question.type === 'TrueFalse') {
                    shuffleArray(question.options);
                    question.options.forEach((option) => {
                        html += `<label class="flex items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="question_${index}" value="${option}" class="h-4 w-4 text-indigo-600 border-gray-300">
                            <span class="ml-3 text-sm text-gray-700">${option}</span>
                        </label>`;
                    });
                } else {
                    html += `<input type="text" name="question_${index}" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="Type answer...">`;
                }
                html += `</div>
                    <div class="quiz-feedback correct"><i data-lucide="check-circle" class="inline-block h-4 w-4 mr-1"></i>Correct!</div>
                    <div class="quiz-feedback incorrect"><i data-lucide="x-circle" class="inline-block h-4 w-4 mr-1"></i>Not quite. Correct answer: <strong>${question.correct_answer}</strong></div>
                    <div class="quiz-feedback-text text-xs italic mt-2 text-gray-500 hidden"></div>
                </div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg flex items-center justify-center"><i data-lucide="check" class="w-5 h-5 mr-2"></i>Check My Answers</button></form>`;
            return html;
        }

        function createSectionHTML(icon, color, title, content) {
            const cleanMarkdown = (text) => String(text).replace(/\*\*/g, '').replace(/## /g, '').replace(/\n/g, '<br>');
            return `<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-4">
                <h3 class="text-lg font-semibold text-gray-800 flex items-center mb-3">
                    <i data-lucide="${icon}" class="text-${color}-500"></i><span class="ml-2">${title}</span>
                </h3>
                <div class="prose prose-sm max-w-none text-gray-600">${cleanMarkdown(content)}</div>
            </div>`;
        }

        // --- CORE APP RENDER FUNCTION ---
        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="min-h-screen md:flex">
                    <aside class="w-full md:w-64 bg-white p-4 border-r border-gray-200 flex flex-col">
                        <div class="mb-8 text-center"><img src="/logo.svg" class="h-16 mx-auto"><h1 class="font-bold mt-2">Learning Genie</h1></div>
                        <nav id="sidebar-nav" class="space-y-2 flex-1"></nav>
                        <div id="usage-prompt-wrapper" class="mt-4 border-t pt-4"></div>
                        <button id="logout-btn" class="mt-4 flex items-center px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg"><i data-lucide="log-out" class="w-5 h-5 mr-2"></i>Logout</button>
                    </aside>
                    <main id="main-content" class="flex-1 p-8 bg-slate-50 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const mainContent = document.getElementById('main-content');
            if (state.activeTab === 'home') mainContent.innerHTML = homePageTemplate();
            else if (state.activeTab === 'homeworkHelper') mainContent.innerHTML = homeworkHelperTemplate;
            else if (state.activeTab === 'learningHub') mainContent.innerHTML = learningHubTemplate;
            else if (state.activeTab === 'explainSimply') mainContent.innerHTML = explainSimplyTemplate;
            else if (state.activeTab === 'testBuilder') mainContent.innerHTML = testBuilderTemplate;
            else if (state.activeTab === 'myActivity') mainContent.innerHTML = myActivityTemplate();
            else if (state.activeTab === 'upgrade') mainContent.innerHTML = upgradeTemplate();
            
            updateSidebar();
            attachToolEventListeners();
            lucide.createIcons();
        }

        function updateSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const tabs = [
                { id: 'home', icon: 'home', label: 'Home' },
                { id: 'homeworkHelper', icon: 'life-buoy', label: 'Homework' },
                { id: 'learningHub', icon: 'book-marked', label: 'Learning Hub' },
                { id: 'explainSimply', icon: 'baby', label: 'Explain Simply' },
                { id: 'testBuilder', icon: 'clipboard-check', label: 'Test Builder' }
            ];
            nav.innerHTML = tabs.map(t => `<button data-nav-link="${t.id}" class="flex items-center w-full px-4 py-2 rounded-lg ${state.activeTab === t.id ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}"><i data-lucide="${t.icon}" class="w-5 h-5 mr-3"></i>${t.label}</button>`).join('');
            
            const usage = document.getElementById('usage-prompt-wrapper');
            const isFree = state.accountData?.active_tier === 'free';
            usage.innerHTML = isFree ? `<div class="p-3 bg-indigo-50 rounded-lg text-xs text-center"><p class="font-bold">Usage: ${state.usageData.count}/${FREE_USAGE_LIMIT}</p><button data-nav-link="upgrade" class="mt-2 text-indigo-600 font-bold underline">Upgrade for unlimited</button></div>` : `<div class="p-3 bg-green-50 rounded-lg text-xs text-center text-green-700 font-bold">Unlimited Access</div>`;
        }

        // --- CORE LOGIC FUNCTIONS ---

        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else {
                state.session = session;
                const { data: account } = await supabaseClient.from('accounts').select('*').eq('id', session.user.id).single();
                state.accountData = account || { active_tier: 'free', profile_limit: 1 };
                const { data: usage } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', session.user.id).single();
                state.usageData = { count: usage?.usage_count || 0, resetDate: usage?.last_reset_date || new Date().toISOString() };
                const { data: profiles } = await supabaseClient.from('profiles').select('*').eq('account_id', session.user.id);
                if (profiles?.length) {
                    state.activeProfile = profiles[0];
                    showMainApp();
                } else {
                    document.getElementById('app-container').innerHTML = `<div class="flex items-center justify-center min-h-screen"><div><h2 class="text-2xl font-bold mb-4">Create Profile</h2><input id="new-profile-name" class="border p-2 rounded mb-2 w-full"><button id="create-profile-init" class="bg-indigo-600 text-white px-4 py-2 rounded w-full">Create</button></div></div>`;
                    document.getElementById('create-profile-init').onclick = async () => {
                        const name = document.getElementById('new-profile-name').value;
                        const { data } = await supabaseClient.from('profiles').insert({ account_id: session.user.id, name }).select().single();
                        state.activeProfile = data;
                        showMainApp();
                    };
                }
            }
        }

        async function fetchWithRetry(prompt, isJson, imageData = null) {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, isJson, imageData })
            });
            const result = await response.json();
            return result.candidates[0].content.parts[0].text;
        }

        async function checkAndIncrementUsage() {
            if (state.accountData.active_tier !== 'free') return true;
            if (state.usageData.count >= FREE_USAGE_LIMIT) {
                alert("Weekly limit reached! Upgrade for more.");
                state.activeTab = 'upgrade';
                renderToolContent();
                return false;
            }
            const newCount = state.usageData.count + 1;
            await supabaseClient.from('monthly_usage').update({ usage_count: newCount }).eq('account_id', state.session.user.id);
            state.usageData.count = newCount;
            updateSidebar();
            return true;
        }

        async function handleGenerateHomeworkHelp() {
            if (!await checkAndIncrementUsage()) return;
            const q = document.getElementById('hh-question').value;
            const btn = document.getElementById('generate-homework-help-btn');
            btn.disabled = true; btn.innerText = "Thinking...";
            const prompt = `Student Question: "${q}". Provide JSON: {"hints": [], "answer": ""}`;
            const jsonText = await fetchWithRetry(prompt, true, state.uploadedImageBase64);
            const res = JSON.parse(jsonText);
            document.getElementById('hh-output').innerHTML = createSectionHTML('lightbulb', 'amber', 'Hints', res.hints.join('<br>')) + createSectionHTML('check', 'green', 'Final Answer', res.answer);
            btn.disabled = false; btn.innerText = "Get Help";
            lucide.createIcons();
        }

        async function handleGenerateLearningHelp() {
            if (!await checkAndIncrementUsage()) return;
            const t = document.getElementById('learn-topic').value;
            const btn = document.getElementById('generate-learning-help-btn');
            btn.disabled = true; btn.innerText = "Generating...";
            const prompt = `Topic: "${t}". Provide JSON: {"learning_objectives": "", "revision_notes": "", "practice_test": [{"question": "", "type": "MCQ/ShortAnswer", "options": [], "correct_answer": ""}]}`;
            const jsonText = await fetchWithRetry(prompt, true);
            const res = JSON.parse(jsonText);
            state.currentTest = res.practice_test;
            document.getElementById('lh-output').innerHTML = createSectionHTML('book-open', 'indigo', 'Revision Notes', res.revision_notes) + `<div class="mt-8">${renderPracticeTest(state.currentTest)}</div>`;
            btn.disabled = false; btn.innerText = "Help Me Learn";
            lucide.createIcons();
        }

        async function handleGenerateExplanation() {
            if (!await checkAndIncrementUsage()) return;
            const t = document.getElementById('explain-topic').value;
            const btn = document.getElementById('generate-explanation-btn');
            btn.disabled = true; btn.innerText = "Thinking...";
            const res = await fetchWithRetry(`Explain simply: ${t}`, false);
            document.getElementById('es-output').innerHTML = createSectionHTML('baby', 'amber', 'Explanation', res);
            btn.disabled = false; btn.innerText = "Explain";
            lucide.createIcons();
        }

        async function handleGenerateTestBuilder() {
            if (!await checkAndIncrementUsage()) return;
            const t = document.getElementById('tb-topic').value;
            const btn = document.getElementById('generate-test-builder-btn');
            btn.disabled = true; btn.innerText = "Creating Test...";
            const prompt = `Create a test on "${t}". Provide JSON: {"practice_test": [{"question": "", "type": "MCQ/ShortAnswer", "options": [], "correct_answer": ""}]}`;
            const jsonText = await fetchWithRetry(prompt, true);
            const res = JSON.parse(jsonText);
            state.currentTest = res.practice_test;
            document.getElementById('tb-output').innerHTML = renderPracticeTest(state.currentTest);
            btn.disabled = false; btn.innerText = "Generate Test";
            lucide.createIcons();
        }

        // --- NEW AI-POWERED QUIZ SUBMISSION ---
        async function handleQuizSubmit() {
            const btn = document.getElementById('submit-quiz-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-3"></div> Marking...';

            let correctCount = 0;
            const total = state.currentTest.length;

            for (let i = 0; i < total; i++) {
                const q = state.currentTest[i];
                const wrapper = document.getElementById(`question-block-${i}`);
                const feedbackText = wrapper.querySelector('.quiz-feedback-text');
                let isCorrect = false;
                let userAnswer = "";

                if (q.type === 'MCQ' || q.type === 'TrueFalse') {
                    const selected = document.querySelector(`input[name="question_${i}"]:checked`);
                    userAnswer = selected ? selected.value : "";
                    isCorrect = (userAnswer.toLowerCase() === q.correct_answer.toLowerCase());
                } else {
                    userAnswer = document.querySelector(`input[name="question_${i}"]`).value.trim();
                    if (userAnswer) {
                        const gradingPrompt = `Question: "${q.question}"\nCorrect Answer: "${q.correct_answer}"\nStudent Answer: "${userAnswer}"\nIs this student answer correct? Ignore minor spelling and match meaning. Return JSON: {"isCorrect": true/false, "feedback": "Short reason"}`;
                        try {
                            const gradeJson = await fetchWithRetry(gradingPrompt, true);
                            const evaluation = JSON.parse(gradeJson);
                            isCorrect = evaluation.isCorrect;
                            feedbackText.innerHTML = evaluation.feedback;
                            feedbackText.classList.remove('hidden');
                        } catch (e) {
                            isCorrect = (userAnswer.toLowerCase() === q.correct_answer.toLowerCase());
                        }
                    }
                }

                if (isCorrect) {
                    correctCount++;
                    wrapper.classList.add('correct');
                    wrapper.classList.remove('incorrect');
                } else {
                    wrapper.classList.add('incorrect');
                    wrapper.classList.remove('correct');
                }
            }

            const percentage = Math.round((correctCount / total) * 100);
            const resultsDiv = document.createElement('div');
            resultsDiv.className = "bg-indigo-600 text-white p-6 rounded-xl mt-8 text-center";
            resultsDiv.innerHTML = `<h3 class="text-2xl font-bold">Score: ${correctCount}/${total} (${percentage}%)</h3>`;
            document.getElementById('quiz-form').appendChild(resultsDiv);
            
            btn.disabled = false; btn.innerHTML = originalText;
            lucide.createIcons();
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function attachToolEventListeners() {
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', handleGenerateHomeworkHelp);
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleGenerateLearningHelp);
            document.getElementById('generate-explanation-btn')?.addEventListener('click', handleGenerateExplanation);
            document.getElementById('generate-test-builder-btn')?.addEventListener('click', handleGenerateTestBuilder);
            document.getElementById('quiz-form')?.addEventListener('submit', (e) => { e.preventDefault(); handleQuizSubmit(); });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
            
            const upload = document.getElementById('image-upload');
            if (upload) upload.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                    document.getElementById('image-preview').src = ev.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            document.getElementById('remove-image-btn')?.addEventListener('click', () => {
                state.uploadedImageBase64 = null;
                document.getElementById('image-preview-wrapper').classList.add('hidden');
            });
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) {
                state.activeTab = link.dataset.navLink;
                renderToolContent();
            }
        });

        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
