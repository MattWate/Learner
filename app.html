<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Genie - Learner Hub</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/html-to-docx@1.8.0/dist/html-to-docx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
        .prose { max-width: 65ch; }
        .prose-sm { font-size: 0.875rem; line-height: 1.5; }
        .genie-logo { width: 5rem; height: 5rem; }
        @media (min-width: 768px) { .genie-logo { width: 12rem; height: 12rem; } }
        .quiz-question-wrapper.correct { border-left: 4px solid #22c55e; background-color: #f0fdf4; }
        .quiz-question-wrapper.incorrect { border-left: 4px solid #ef4444; background-color: #fef2f2; }
        .quiz-feedback { display: none; font-size: 0.875rem; font-weight: 500; margin-top: 0.75rem; }
        .quiz-question-wrapper.correct .quiz-feedback.correct { display: block; color: #166534; }
        .quiz-question-wrapper.incorrect .quiz-feedback.incorrect { display: block; color: #991b1b; }
        .quiz-feedback-explanation { font-size: 0.75rem; font-style: italic; margin-top: 0.5rem; color: #4f46e5; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen">
        <div id="loading-spinner" class="flex items-center justify-center min-h-screen">
             <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600"></div>
        </div>
    </div>
    <div id="paywall-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop transition-opacity">
        <div id="paywall-content" class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center transform transition-transform scale-90"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';
        const FREE_USAGE_LIMIT = 5;
        const FREE_PROFILE_LIMIT = 1;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            session: null, accountData: null, usageData: { count: 0, resetDate: null },
            activeProfile: null, activeTab: 'home', uploadedImageBase64: null,
            currentTest: null, myActivityData: [] 
        };

        // --- DASHBOARD TEMPLATE ---
        function homePageTemplate() {
            return `
            <div class="max-w-6xl mx-auto space-y-12">
                <div class="bg-white p-8 md:p-12 rounded-xl shadow-xl border-t-4 border-indigo-500 text-center">
                    <i data-lucide="sparkles" class="mx-auto h-16 w-16 text-amber-400"></i>
                    <h1 class="mt-4 text-4xl md:text-5xl font-bold text-gray-800">Welcome, ${state.activeProfile.name}!</h1>
                    <p class="mt-2 text-gray-600">What would you like to achieve today?</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-stretch">
                    <div class="space-y-4 flex flex-col">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center px-2"><i data-lucide="graduation-cap" class="mr-2 text-teal-500"></i> Need help studying?</h2>
                        <div data-nav-link="learningHub" class="group bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-teal-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Learning Hub</h3>
                            <p class="text-sm text-gray-500 mt-1">Full revision notes and practice tests.</p>
                        </div>
                        <div data-nav-link="testBuilder" class="group bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-teal-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Test Builder</h3>
                            <p class="text-sm text-gray-500 mt-1">Create a custom practice exam.</p>
                        </div>
                    </div>
                    <div class="space-y-4 flex flex-col">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center px-2"><i data-lucide="help-circle" class="mr-2 text-rose-500"></i> Homework support?</h2>
                        <div data-nav-link="homeworkHelper" class="group bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-rose-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Homework Helper</h3>
                            <p class="text-sm text-gray-500 mt-1">Upload a photo for hints and guidance.</p>
                        </div>
                        <div data-nav-link="explainSimply" class="group bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-rose-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Explain It Simply</h3>
                            <p class="text-sm text-gray-500 mt-1">Complex topics made simple.</p>
                        </div>
                    </div>
                    <div class="space-y-4 flex flex-col h-full">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center px-2"><i data-lucide="plus-circle" class="mr-2 text-violet-500"></i> Math support?</h2>
                        <div data-nav-link="mathHub" class="group bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-violet-400 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">Math Hub</h3>
                                <p class="text-sm text-gray-500 mt-1">Python-powered accuracy for calculations.</p>
                            </div>
                            <div class="mt-4 text-xs font-bold text-violet-600 flex items-center"><i data-lucide="zap" class="w-3 h-3 mr-1"></i> LOGIC ENGINE READY</div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        const learningHubTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Learning Hub</h2>
                    <p class="text-gray-500 mb-8">Describe a topic to get notes and a practice test.</p>
                    <textarea id="learn-topic" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:ring-indigo-500 focus:border-indigo-500" placeholder="e.g., The Solar System"></textarea>
                    <button id="generate-learning-help-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Help Me Learn</button>
                    <div id="lh-error" class="text-red-500 text-sm mt-2 hidden"></div>
                </div>
                <div id="lh-output" class="mt-8"></div>
            </div>`;

        const testBuilderTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-teal-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Test Builder</h2>
                    <p class="text-gray-500 mb-8">Configure your custom practice test.</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                            <textarea id="tb-topic" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-teal-500" placeholder="e.g., Photosynthesis"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Questions</label>
                            <select id="tb-num-questions" class="w-full px-4 py-2 border rounded-lg bg-white">
                                <option value="5">5</option><option value="10" selected>10</option><option value="20">20</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Types</label>
                            <div class="flex flex-wrap gap-4 mt-2">
                                <label class="flex items-center text-sm"><input type="checkbox" id="tb-qt-mcq" class="mr-2" checked> MCQ</label>
                                <label class="flex items-center text-sm"><input type="checkbox" id="tb-qt-tf" class="mr-2" checked> T/F</label>
                                <label class="flex items-center text-sm"><input type="checkbox" id="tb-qt-short" class="mr-2" checked> Short Answer</label>
                            </div>
                        </div>
                    </div>
                    <button id="generate-test-builder-btn" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg hover:bg-teal-700 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Generate Test</button>
                    <div id="tb-error" class="text-red-500 text-sm mt-2 hidden"></div>
                </div>
                <div id="tb-output" class="mt-8"></div>
            </div>`;

        const homeworkHelperTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-rose-400">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Homework Helper</h2>
                    <p class="text-gray-500 mb-8">Type your question or upload a worksheet photo.</p>
                    <textarea id="hh-question" rows="3" class="w-full px-4 py-2 border rounded-lg mb-4 focus:ring-rose-500" placeholder="Ask anything..."></textarea>
                    <div class="border-2 border-dashed border-gray-300 p-6 text-center rounded-lg mb-4 relative">
                        <input type="file" id="image-upload" class="hidden" accept="image/*">
                        <label for="image-upload" class="cursor-pointer text-indigo-600 font-bold hover:underline">Click to upload photo</label>
                        <div id="image-preview-wrapper" class="hidden mt-4"><img id="image-preview" class="max-h-64 mx-auto rounded shadow-lg"><button id="remove-image-btn" class="text-red-500 text-xs mt-2 block mx-auto font-bold">Remove Image</button></div>
                    </div>
                    <button id="generate-homework-help-btn" class="w-full bg-rose-500 text-white font-bold py-3 rounded-lg hover:bg-rose-600 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Get Help</button>
                </div>
                <div id="hh-output" class="mt-8"></div>
            </div>`;

        const explainSimplyTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-amber-400">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Explain It Simply</h2>
                    <p class="text-gray-500 mb-8">Enter a concept to get a simple, clear explanation.</p>
                    <textarea id="explain-topic" rows="4" class="w-full px-4 py-2 border rounded-lg focus:ring-amber-500 mb-6" placeholder="e.g. How does gravity work?"></textarea>
                    <button id="generate-explanation-btn" class="w-full bg-amber-500 text-white font-bold py-3 rounded-lg hover:bg-amber-600 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Explain</button>
                </div>
                <div id="es-output" class="mt-8"></div>
            </div>`;

        // --- UTILS ---
        function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }

        async function fetchWithRetry(prompt, isJson, retries = 1, imageData = null) {
            try {
                const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, isJson, imageData }) });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) { if (retries > 0) return fetchWithRetry(prompt, isJson, retries - 1, imageData); throw error; }
        }

        async function checkAndIncrementUsage() {
            if (state.accountData?.active_tier !== 'free') return true;
            if (state.usageData.count >= FREE_USAGE_LIMIT) { showPaywallModal('usage'); return false; }
            state.usageData.count++;
            await supabaseClient.from('monthly_usage').update({ usage_count: state.usageData.count }).eq('account_id', state.session.user.id);
            updateSidebar();
            return true;
        }

        function createSectionHTML(icon, color, title, content) {
            const clean = (t) => String(t).replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return `<div class="bg-white p-6 rounded-lg shadow-sm border mb-4"><h3 class="text-lg font-bold flex items-center mb-3 text-gray-800"><i data-lucide="${icon}" class="text-${color}-500 mr-2"></i>${title}</h3><div class="text-gray-600 prose-sm">${clean(content)}</div></div>`;
        }

        function renderPracticeTest(testData) {
            if (!testData || !testData.length) return "";
            let html = '<form id="quiz-form" class="space-y-6">';
            testData.forEach((q, i) => {
                html += `<div id="question-block-${i}" class="quiz-question-wrapper border-l-4 border-gray-200 p-6 rounded-r-lg bg-white shadow-sm">`;
                html += `<p class="font-bold text-gray-800 mb-4">${i + 1}. ${q.question}</p>`;
                if (q.type === 'MCQ' || q.type === 'TrueFalse') {
                    if (q.options) shuffleArray(q.options);
                    q.options?.forEach(opt => { html += `<label class="flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer mb-2 border border-transparent hover:border-indigo-100 transition"><input type="radio" name="q_${i}" value="${opt}" class="w-4 h-4 text-indigo-600 mr-3"><span>${opt}</span></label>`; });
                } else {
                    html += `<input type="text" name="q_${i}" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="Type your answer...">`;
                }
                html += `<div class="quiz-feedback-explanation hidden p-3 mt-4 bg-indigo-50 rounded-lg text-sm italic text-indigo-700 border-l-4 border-indigo-400"></div></div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg">Check Answers</button></form>`;
            return html;
        }

        // --- HANDLERS ---
        async function handleQuizSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-quiz-btn');
            btn.disabled = true; btn.innerHTML = "Marking work...";
            let score = 0;

            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const fb = block.querySelector('.quiz-feedback-explanation');
                const val = q.type === 'ShortAnswer' ? document.querySelector(`[name="q_${i}"]`).value.trim() : document.querySelector(`[name="q_${i}"]:checked`)?.value;

                let correct = false;
                if (q.type !== 'ShortAnswer') { 
                    correct = val === q.correct_answer; 
                } else if (val) {
                    const prompt = `Grade Answer: Question: "${q.question}" Correct Concept: "${q.correct_answer}" Student: "${val}". JSON: {"isCorrect":true,"explanation":""}`;
                    try {
                        const res = JSON.parse(await fetchWithRetry(prompt, true));
                        correct = res.isCorrect;
                        if(fb) { fb.innerText = res.explanation || ""; fb.classList.remove('hidden'); }
                    } catch (e) { correct = val.toLowerCase() === q.correct_answer.toLowerCase(); }
                }

                block.className = `quiz-question-wrapper border-l-4 p-6 rounded-r-lg mb-4 ${correct ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                if(correct) score++;
            }
            btn.innerHTML = `Finished! Score: ${score}/${state.currentTest.length}`;
            lucide.createIcons();
        }

        async function handleLearningHub() {
            if (!await checkAndIncrementUsage()) return;
            const topic = document.getElementById('learn-topic').value;
            const out = document.getElementById('lh-output');
            out.innerHTML = `<div class="text-center p-8 animate-pulse text-gray-500 font-bold">Building your custom learning guide...</div>`;
            const prompt = `Pedagogical Guide for "${topic}". JSON: {"learning_objectives":"", "revision_notes":"", "practice_test":[{"question":"", "type":"MCQ/TrueFalse/ShortAnswer", "options":[], "correct_answer":""}]}`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = createSectionHTML('check-circle', 'green', 'Objectives', data.learning_objectives) + createSectionHTML('book-open', 'indigo', 'Notes', data.revision_notes) + renderPracticeTest(data.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form')?.addEventListener('submit', handleQuizSubmit);
                
                supabaseClient.from('saved_work').insert({ profile_id: state.activeProfile.id, work_type: 'learningHub', input_prompt: {topic}, output_content: data }).then();
            } catch(e) { out.innerHTML = `<p class="text-red-500">Error.</p>`; }
        }

        async function handleTestBuilder() {
            if (!await checkAndIncrementUsage()) return;
            const topic = document.getElementById('tb-topic').value;
            const num = document.getElementById('tb-num-questions').value;
            const types = [];
            if(document.getElementById('tb-qt-mcq').checked) types.push('MCQ');
            if(document.getElementById('tb-qt-tf').checked) types.push('TrueFalse');
            if(document.getElementById('tb-qt-short').checked) types.push('ShortAnswer');

            const out = document.getElementById('tb-output');
            out.innerHTML = `<div class="text-center p-8 font-bold text-teal-600">Generating Exam...</div>`;
            const prompt = `Create ${num}-question test on "${topic}" with types: ${types.join(',')}. JSON: {"practice_test":[{"question":"", "type":"", "options":[], "correct_answer":""}]}`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = renderPracticeTest(data.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form')?.addEventListener('submit', handleQuizSubmit);
                
                supabaseClient.from('saved_work').insert({ profile_id: state.activeProfile.id, work_type: 'testBuilder', input_prompt: {topic}, output_content: data }).then();
            } catch(e) { out.innerHTML = `<p class="text-red-500">Error.</p>`; }
        }

        async function handleHomeworkHelper() {
            if (!await checkAndIncrementUsage()) return;
            const q = document.getElementById('hh-question').value;
            const out = document.getElementById('hh-output');
            out.innerHTML = `<div class="text-center p-8 font-bold text-rose-500">Analyzing Homework...</div>`;
            const prompt = `Worksheet Helper for: "${q}". JSON: {"breakdown":"", "hints":[], "answers":[]}`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true, 1, state.uploadedImageBase64));
                out.innerHTML = createSectionHTML('list', 'blue', 'Step Breakdown', data.breakdown) + createSectionHTML('lightbulb', 'yellow', 'Hints', data.hints.join('<br>')) + createSectionHTML('key', 'green', 'Final Answers', data.answers.join('<br>'));
                lucide.createIcons();
                
                supabaseClient.from('saved_work').insert({ profile_id: state.activeProfile.id, work_type: 'homeworkHelper', input_prompt: {q}, output_content: data }).then();
            } catch(e) { out.innerHTML = "Error."; }
        }

        function attachListeners() {
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleLearningHub);
            document.getElementById('generate-test-builder-btn')?.addEventListener('click', handleTestBuilder);
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', handleHomeworkHelper);
            document.getElementById('generate-explanation-btn')?.addEventListener('click', async () => {
                if (!await checkAndIncrementUsage()) return;
                const topic = document.getElementById('explain-topic').value;
                document.getElementById('es-output').innerHTML = "Simplifying...";
                const res = await fetchWithRetry(`Explain "${topic}" to a child using analogies.`, false);
                document.getElementById('es-output').innerHTML = createSectionHTML('baby', 'amber', 'Simple Explanation', res);
                lucide.createIcons();
            });
            document.getElementById('image-upload')?.addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            });
            document.getElementById('remove-image-btn')?.addEventListener('click', () => { state.uploadedImageBase64 = null; document.getElementById('image-preview-wrapper').classList.add('hidden'); });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
        }

        // --- NAVIGATION SHELL ---
        function renderToolContent() {
            const main = document.getElementById('main-content');
            switch (state.activeTab) {
                case 'home': main.innerHTML = homePageTemplate(); break;
                case 'learningHub': main.innerHTML = learningHubTemplate; break;
                case 'testBuilder': main.innerHTML = testBuilderTemplate; break;
                case 'homeworkHelper': main.innerHTML = homeworkHelperTemplate; break;
                case 'explainSimply': main.innerHTML = explainSimplyTemplate; break;
                case 'mathHub': main.innerHTML = `<div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-xl border-t-4 border-violet-500"><h2 class="text-3xl font-bold mb-4">Math Hub</h2><div class="text-center p-12 bg-slate-50 border-2 border-dashed rounded-xl"><i data-lucide="brain-circuit" class="mx-auto h-16 w-16 text-violet-300"></i><h3 class="mt-4 text-xl font-bold">Initializing Math Logic Engine...</h3><p class="text-gray-500">Python-powered accuracy coming in Phase 2.</p></div></div>`; break;
                case 'myActivity': main.innerHTML = `<div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500"><h2 class="text-3xl font-bold mb-4">Activity</h2><div id="my-activity-output" class="space-y-4"></div></div>`; break;
            }
            const nav = document.getElementById('sidebar-nav');
            const tabs = [{id:'home', icon:'home', label:'Home'}, {id:'learningHub', icon:'book-marked', label:'Study'}, {id:'homeworkHelper', icon:'life-buoy', label:'Homework'}, {id:'explainSimply', icon:'baby', label:'Explain'}, {id:'mathHub', icon:'calculator', label:'Math'}, {id:'testBuilder', icon:'clipboard-check', label:'Tests'}, {id:'myActivity', icon:'history', label:'Activity'}];
            nav.innerHTML = tabs.map(t => `<button data-nav-link="${t.id}" class="flex items-center w-full px-4 py-2 rounded-lg ${state.activeTab === t.id ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'} capitalize mb-1"><i data-lucide="${t.icon}" class="w-5 h-5 mr-3"></i>${t.label}</button>`).join('');
            
            const usage = document.getElementById('usage-prompt-wrapper');
            const isFree = state.accountData?.active_tier === 'free';
            usage.innerHTML = isFree ? `<div class="p-3 bg-indigo-50 rounded-lg text-center border border-indigo-100 mb-2"><p class="text-xs font-bold text-indigo-700">Trial: ${FREE_USAGE_LIMIT - state.usageData.count}/${FREE_USAGE_LIMIT} Left</p></div><button data-nav-link="upgrade" class="w-full bg-rose-500 text-white font-bold py-2 rounded-lg text-xs">Unlock Unlimited</button>` : `<div class="p-3 bg-green-50 rounded-lg text-center font-bold text-green-700 text-xs border border-green-100 italic">UNLIMITED PLAN ACTIVE</div>`;
            
            lucide.createIcons();
            attachListeners();
        }

        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else { 
                state.session = session;
                const { data: acc } = await supabaseClient.from('accounts').select('*').eq('id', session.user.id).single();
                state.accountData = acc || { active_tier: 'free' };
                const { data: usg } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', session.user.id).single();
                state.usageData = { count: usg?.usage_count || 0 };
                const { data: profs } = await supabaseClient.from('profiles').select('*').eq('account_id', session.user.id);
                state.activeProfile = profs?.[0];
                document.getElementById('app-container').innerHTML = `<div class="min-h-screen md:flex"><aside id="sidebar" class="w-64 bg-white border-r p-4 hidden md:flex flex-col h-screen sticky top-0"><div data-nav-link="home" class="mb-8 text-center cursor-pointer group"><img src="/logo.svg" class="h-16 mx-auto group-hover:scale-110 transition"><h1 class="font-bold text-gray-800 mt-2 text-xl">Learning Genie</h1></div><nav id="sidebar-nav" class="flex-1"></nav><div id="usage-prompt-wrapper" class="mt-auto border-t pt-4"></div><button id="logout-btn" class="mt-4 flex items-center px-4 py-2 text-gray-400 hover:text-gray-600 transition font-bold"><i data-lucide="log-out" class="w-4 h-4 mr-2"></i>Sign Out</button></aside><main id="main-content" class="flex-1 p-4 md:p-8 bg-slate-50 overflow-y-auto"></main></div>`;
                renderToolContent();
            }
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) { state.activeTab = link.dataset.navLink; renderToolContent(); }
        });
        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
