        async function fetchWithRetry(prompt, isJson, retries = 2, requestType = 'text', imageData = null) {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) throw new Error('Session Expired');
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, isJson, requestType, imageData })
                });
                if (!response.ok) {
                    const errBody = await response.json();
                    throw new Error(errBody.error || `Error ${response.status}`);
                }
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("Empty AI response");
                return text;
            } catch (error) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, 1500));
                    return fetchWithRetry(prompt, isJson, retries - 1, requestType, imageData);
                }
                throw error;
            }
        }

        async function handleQuizSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-quiz-btn');
            const original = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = "Marking with Gemini AI...";
            let score = 0;

            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const fb = block.querySelector('.quiz-feedback-explanation');
                let userVal;
                let isCorrect = false;

                if (q.type === 'MCQ' || q.type === 'TrueFalse') {
                    const selected = document.querySelector(`input[name="question_${i}"]:checked`);
                    userVal = selected ? selected.value : null;
                    isCorrect = userVal && userVal.toLowerCase() === q.correct_answer.toLowerCase();
                } else {
                    userVal = document.querySelector(`input[name="question_${i}"]`).value.trim();
                    if (userVal) {
                        const gradingPrompt = `Pedagogical Evaluator: Evaluate student answer. Question: "${q.question}" Correct Concept: "${q.correct_answer}" Student: "${userVal}". Reply ONLY JSON: {"isCorrect": true/false, "explanation": "1 sentence why."}`;
                        try {
                            const resJson = await fetchWithRetry(gradingPrompt, true);
                            const evalObj = JSON.parse(resJson);
                            isCorrect = evalObj.isCorrect;
                            if (fb) { fb.innerText = evalObj.explanation || ""; fb.classList.remove('hidden'); }
                        } catch (e) { isCorrect = userVal.toLowerCase() === q.correct_answer.toLowerCase(); }
                    }
                }
                block.className = `quiz-question-wrapper border-l-4 p-6 rounded-r-lg mb-6 shadow-sm ${isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                if (isCorrect) score++;
            }
            btn.innerHTML = `Finished! Score: ${score}/${state.currentTest.length}`;
            lucide.createIcons();
        }

        async function handleGenerateTestBuilder() {

            const out = document.getElementById('tb-output');

            try {
                const prompt = `Exam on "${topic}". ${num} questions. Types: ${types.join(',')}. JSON: {"practice_test":[]}`;

                state.currentTest = data.practice_test;

        function renderPracticeTest(testData) {
            let html = '<form id="quiz-form" class="space-y-6 mt-8">';
            testData.forEach((q, i) => {
                html += `<div id="question-block-${i}" class="quiz-question-wrapper border-l-4 border-gray-200 p-6 rounded-r-lg bg-white shadow-sm mb-4"><p class="font-bold text-gray-800 mb-4">${i + 1}. ${q.question}</p>`;
                if (q.type === 'MCQ' || q.type === 'TrueFalse') {
                    if (q.options) shuffleArray(q.options);
                    q.options?.forEach(opt => { html += `<label class="flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer mb-2 border border-transparent hover:border-indigo-100 transition"><input type="radio" name="question_${i}" value="${opt}" class="w-4 h-4 text-indigo-600 mr-3"><span>${opt}</span></label>`; });
                } else {
                    html += `<input type="text" name="question_${i}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="Type answer...">`;
                }
                html += `<div class="quiz-feedback-explanation hidden p-3 mt-4 bg-indigo-50 rounded-lg text-sm italic text-indigo-700"></div></div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Check Answers</button></form>`;
            return html;
        }

        function createSectionHTML(icon, color, title, content) {
            const clean = (t) => String(t).replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return `<div class="bg-white p-8 rounded-xl shadow-sm border mb-6"><h3 class="text-xl font-bold flex items-center mb-4 text-gray-800"><i data-lucide="${icon}" class="text-${color}-500 mr-3"></i>${title}</h3><div class="text-gray-600 leading-relaxed">${clean(content)}</div></div>`;
        }

            const nav = document.getElementById('sidebar-nav');
            const usage = document.getElementById('usage-prompt-wrapper');
            const tabs = [{id:'home', icon:'home', label:'Home'}, {id:'learningHub', icon:'book-marked', label:'Study'}, {id:'homeworkHelper', icon:'life-buoy', label:'Homework'}, {id:'explainSimply', icon:'baby', label:'Explain'}, {id:'mathHub', icon:'calculator', label:'Math'}, {id:'testBuilder', icon:'clipboard-check', label:'Tests'}, {id:'myActivity', icon:'history', label:'Activity'}];
            nav.innerHTML = tabs.map(t => `<button data-nav-link="${t.id}" class="flex items-center w-full px-4 py-3 rounded-xl transition ${state.activeTab === t.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-gray-600 hover:bg-gray-100'} capitalize mb-1 font-bold"><i data-lucide="${t.icon}" class="w-5 h-5 mr-3"></i>${t.label}</button>`).join('');
            
            const isFree = state.accountData?.active_tier === 'free';
            usage.innerHTML = isFree ? `<div class="p-3 bg-indigo-50 rounded-lg text-center border mb-2"><p class="text-xs font-bold text-indigo-700">Trial: ${state.usageData.count}/${FREE_USAGE_LIMIT}</p></div>` : `<div class="p-3 bg-green-50 rounded-lg text-center font-bold text-green-700 text-xs italic">UNLIMITED PLAN</div>`;
            
            lucide.createIcons();
            attachListeners();
        }

        function attachListeners() {
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleGenerateLearningHelp);
            document.getElementById('generate-test-builder-btn')?.addEventListener('click', handleGenerateTestBuilder);
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', async () => {
                if (!await checkAndIncrementUsage()) return;
                const q = document.getElementById('hh-question').value;
                const out = document.getElementById('hh-output');
                out.innerHTML = "Analyzing...";
                const res = JSON.parse(await fetchWithRetry(`Analyze worksheet question "${q}". JSON: {"hints":[], "answer":""}`, true, 1, 'text', state.uploadedImageBase64));
                out.innerHTML = createSectionHTML('lightbulb', 'yellow', 'Hints', res.hints.join('<br>')) + createSectionHTML('key', 'green', 'Answer', res.answer);
                lucide.createIcons();
            });
            document.getElementById('image-upload')?.addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
        }

        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else { 
                state.session = session;
                const { data: acc } = await supabaseClient.from('accounts').select('*').eq('id', session.user.id).single();
                state.accountData = acc || { active_tier: 'free' };
                const { data: usg } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', session.user.id).single();
                state.usageData = { count: usg?.usage_count || 0 };
                const { data: profs } = await supabaseClient.from('profiles').select('*').eq('account_id', session.user.id);
                state.activeProfile = profs?.[0];
                document.getElementById('app-container').innerHTML = `<div class="min-h-screen md:flex"><aside id="sidebar" class="w-64 bg-white border-r p-4 hidden md:flex flex-col h-screen sticky top-0"><div data-nav-link="home" class="mb-10 text-center cursor-pointer group"><img src="/logo.svg" class="h-20 mx-auto group-hover:scale-110 transition"><h1 class="font-bold text-gray-800 mt-2 text-xl">Learning Genie</h1></div><nav id="sidebar-nav" class="flex-1"></nav><div id="usage-prompt-wrapper" class="mt-auto border-t pt-4"></div><button id="logout-btn" class="mt-6 flex items-center px-4 py-2 text-gray-400 hover:text-indigo-600 transition font-black"><i data-lucide="log-out" class="w-4 h-4 mr-2"></i>Logout</button></aside><main id="main-content" class="flex-1 p-4 md:p-12 bg-slate-50 overflow-y-auto"></main></div>`;
                renderToolContent();
            }
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) { state.activeTab = link.dataset.navLink; renderToolContent(); }
        });
        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
