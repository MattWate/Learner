                 message = `Limit of ${state.accountData.profile_limit} profiles reached. Upgrade to add more.`;
            }
            return `<i data-lucide="lock" class="h-12 w-12 text-rose-500 mx-auto mb-4"></i><h2 class="text-2xl font-bold text-gray-800 mb-2">${title}</h2><p class="text-gray-600 mb-6">${message}</p><button id="close-paywall-modal-btn" class="mt-4 mr-2 bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300">Close</button><button data-nav-link="upgrade" class="mt-4 ml-2 bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700">Upgrade Now</button>`;
        };
        
        const createProfileTemplate = (message = 'Create your first learner profile.') => `<div class="min-h-screen flex items-center justify-center bg-gradient-to-b from-indigo-50 to-white p-4"><div class="max-w-md w-full bg-white p-8 rounded-xl shadow-2xl text-center"><h1 class="text-3xl font-bold text-gray-800 mb-2">Create Learner Profile</h1><p class="text-gray-600 mb-6">${message}</p><form id="create-profile-form"><label for="profile-name" class="block text-sm font-medium text-gray-700 text-left mb-1">Profile Name</label><input type="text" id="profile-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" required placeholder="e.g., Alex"><button type="submit" id="create-profile-btn" class="mt-4 w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700 disabled:bg-indigo-300">Create Profile</button><div id="profile-error" class="text-red-500 text-sm mt-2 hidden"></div></form></div></div>`;

        // --- UTILITY FUNCTIONS ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function renderPracticeTest(testData) {
            if (!testData || testData.length === 0) return "<p class='text-sm text-gray-500'>No test generated.</p>";
            let html = '<form id="quiz-form" class="space-y-6">';
            testData.forEach((question, index) => {
                html += `<div id="question-block-${index}" class="quiz-question-wrapper border-l-4 border-gray-200 p-4 rounded-r-lg"><p class="font-semibold text-gray-800 mb-3">${index + 1}. ${question.question}</p><div class="space-y-2">`;
                if (question.type === 'MCQ' || question.type === 'TrueFalse') {
                    shuffleArray(question.options);
                    question.options.forEach((option) => {
                        html += `<label class="flex items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer"><input type="radio" name="question_${index}" value="${option}" class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500"><span class="ml-3 text-sm text-gray-700">${option}</span></label>`;
                    });
                } else if (question.type === 'ShortAnswer') {
                    html += `<input type="text" name="question_${index}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="Type answer...">`;
                }
                html += `</div><div class="quiz-feedback correct"><i data-lucide="check-circle" class="inline-block h-4 w-4 mr-1"></i>Correct!</div><div class="quiz-feedback incorrect"><i data-lucide="x-circle" class="inline-block h-4 w-4 mr-1"></i>Incorrect. Correct: <strong>${question.correct_answer}</strong></div><div class="quiz-feedback-explanation text-xs italic mt-2 text-indigo-600 hidden"></div></div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 flex items-center justify-center disabled:bg-green-300"><i data-lucide="check" class="w-5 h-5 mr-2"></i>Check My Answers</button></form>`;
            return html;
        }

        function createSectionHTML(icon, color, title, content) {
            const cleanMarkdown = (text) => String(text).replace(/\*\*\*(.*?)\*\*\*/g, '<hr class="my-4 border-gray-200"><strong><em>$1</em></strong><hr class="my-4 border-gray-200">').replace(/\*\*/g, '').replace(/\*/g, '').replace(/## /g, '<h3 class="text-md font-semibold mt-4">').replace(/\n/g, '<br>');
            return `<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-4"><h3 class="text-lg font-semibold text-gray-800 flex items-center mb-3"><i data-lucide="${icon}" class="text-${color}-500 mr-2"></i>${title}</h3><div class="prose prose-sm max-w-none text-gray-600">${cleanMarkdown(content)}</div></div>`;
        }

        // --- CORE APP RENDER FUNCTION ---
        function showMainApp() {
            const appContainer = document.getElementById('app-container');
            appContainer.innerHTML = `
                <div class="min-h-screen md:flex">
                    <aside id="sidebar" class="hidden md:flex w-full md:w-64 bg-white p-4 md:h-screen md:sticky top-0 border-r border-gray-200 print:hidden flex-col fixed inset-0 z-50 md:relative">
                        <button data-nav-link="home" class="hidden md:flex flex-col items-center text-center mb-8 w-full group">
                            <img src="/logo.svg" alt="Learning Genie Logo" class="genie-logo mb-2 transition-transform group-hover:scale-110">
                            <h1 class="text-xl font-bold text-gray-800 group-hover:text-indigo-600 transition-colors">Learning Genie</h1>
                        </button>
                        <button id="menu-close-btn" class="md:hidden absolute top-4 right-4 p-2 text-gray-600 hover:text-gray-900"><i data-lucide="x" class="h-6 w-6"></i></button>
                        <nav id="sidebar-nav" class="space-y-2 mt-12 md:mt-0"></nav>
                        <div id="usage-prompt-wrapper" class="mt-auto pt-4 space-y-2 border-t border-gray-100"></div>
                        <div class="pt-2">
                            <button id="profile-picker-btn" class="flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-100"><i data-lucide="users" class="h-5 w-5"></i><span class="ml-3">Switch Profile</span></button>
                            <button id="logout-btn" class="flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-100"><i data-lucide="log-out" class="h-5 w-5"></i><span class="ml-3">Log Out</span></button>
                            <a href="/legal.html" target="_blank" class="flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-100"><i data-lucide="shield" class="h-5 w-5"></i><span class="ml-3">Terms & Privacy</span></a>
                        </div>
                    </aside>
                    <div class="flex-1 flex flex-col min-w-0">
                        <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-40">
                            <div class="flex items-center cursor-pointer" data-nav-link="home"><img src="/logo.svg" alt="Learning Genie Logo" class="h-8 w-8 mr-2"><span class="font-bold text-lg text-gray-800">Learning Genie</span></div>
                            <button id="menu-toggle-btn" class="p-2 -mr-2 text-gray-600 rounded-lg hover:bg-gray-100 focus:outline-none focus:bg-gray-100"><i data-lucide="menu" class="h-6 w-6"></i></button>
                        </header>
                        <main id="main-content" class="flex-1 p-4 md:p-8"></main>
                    </div>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const mainContent = document.getElementById('main-content');
            if (!mainContent) return;
            let contentHTML = '';
            switch (state.activeTab) {
                case 'home': contentHTML = homePageTemplate(); break;
                case 'homeworkHelper': contentHTML = homeworkHelperTemplate; break;
                case 'learningHub': contentHTML = learningHubTemplate; break;
                case 'mathHub': contentHTML = mathHubTemplate; break; // NEW
                case 'explainSimply': contentHTML = explainSimplyTemplate; break;
                case 'testBuilder': contentHTML = testBuilderTemplate; break;
                case 'myActivity': contentHTML = myActivityTemplate(); break;
                case 'upgrade': contentHTML = upgradeTemplate(); break;
                default: contentHTML = homePageTemplate();
            }
            mainContent.innerHTML = contentHTML;
            updateSidebar();
            lucide.createIcons();
            attachToolEventListeners();
            if (state.activeTab === 'myActivity' && state.accountData?.active_tier !== 'free') loadMyActivity();
        }

        function attachToolEventListeners() {
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', handleGenerateHomeworkHelp);
            document.getElementById('image-upload')?.addEventListener('change', handleImageChange);
            document.getElementById('remove-image-btn')?.addEventListener('click', handleRemoveImage);
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleGenerateLearningHelp);
            document.getElementById('generate-explanation-btn')?.addEventListener('click', handleGenerateExplanation);
            document.getElementById('generate-test-builder-btn')?.addEventListener('click', handleGenerateTestBuilder);
            document.getElementById('quiz-form')?.addEventListener('submit', (e) => { e.preventDefault(); handleQuizSubmit(); });
            document.querySelectorAll('.upgrade-btn').forEach(btn => btn.addEventListener('click', (e) => handleUpgrade(e.currentTarget.dataset.plan)));
            document.querySelectorAll('.view-work-btn').forEach(btn => btn.addEventListener('click', (e) => displaySavedWork(state.myActivityData[e.target.dataset.workIndex])));
        }

        function updateSidebar() {
            const sidebarNav = document.getElementById('sidebar-nav');
            const usageWrapper = document.getElementById('usage-prompt-wrapper');
            if (!sidebarNav || !usageWrapper) return; 
            const navItems = {
                home: { icon: 'home', label: 'Home' },
                homeworkHelper: { icon: 'life-buoy', label: 'Homework Helper' },
                learningHub: { icon: 'book-marked', label: 'Learning Hub' },
                explainSimply: { icon: 'baby', label: 'Explain It Simply' },
                mathHub: { icon: 'calculator', label: 'Math Hub' }, // NEW
                testBuilder: { icon: 'clipboard-check', label: 'Test Builder' },
                myActivity: { icon: 'history', label: 'My Activity' }
            };
            let navHtml = '';
            ['home', 'homeworkHelper', 'learningHub', 'explainSimply', 'mathHub', 'testBuilder'].forEach(tab => {
                const item = navItems[tab];
                navHtml += `<button data-nav-link="${tab}" class="nav-link flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg"><i data-lucide="${item.icon}" class="h-5 w-5"></i><span class="ml-3">${item.label}</span></button>`;
            });
            navHtml += `<button data-nav-link="myActivity" class="nav-link flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg border-t mt-2 pt-2 border-gray-100"><i data-lucide="${navItems.myActivity.icon}" class="h-5 w-5"></i><span class="ml-3">${navItems.myActivity.label}</span></button>`;
            sidebarNav.innerHTML = navHtml; 
            const isFree = state.accountData?.active_tier === 'free';
            if (isFree) {
                const remaining = FREE_USAGE_LIMIT - state.usageData.count;
                usageWrapper.innerHTML = `<div class="p-3 bg-indigo-50 rounded-lg text-center"><p class="font-semibold text-indigo-700 text-sm">Trial Limit</p><p class="text-2xl font-bold text-indigo-900">${remaining}/${FREE_USAGE_LIMIT}</p></div><button data-nav-link="upgrade" class="w-full bg-rose-500 text-white font-semibold py-2 px-3 rounded-lg text-sm">Upgrade Now</button>`;
            } else {
                usageWrapper.innerHTML = `<div class="p-3 bg-green-50 rounded-lg text-center font-semibold text-green-700 text-sm">Unlimited Access</div>`;
            }
            document.querySelectorAll('.nav-link').forEach(link => {
                const linkTab = link.dataset.navLink;
                if (linkTab === state.activeTab) {
                    link.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
                    link.classList.remove('text-gray-600', 'hover:bg-gray-100');
                } else {
                    link.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                    link.classList.add('text-gray-600', 'hover:bg-gray-100');
                }
            });
            lucide.createIcons();
        }

        // --- CORE LOGIC FUNCTIONS ---
        async function handleAuth() {
            supabaseClient.auth.onAuthStateChange((event, session) => { if (event === 'SIGNED_OUT') window.location.href = '/login.html'; });
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else { state.session = session; await checkAccountStatus(session.user); }
        }
        
        async function checkAccountStatus(user) {
            try {
                const { data: account } = await supabaseClient.from('accounts').select('*').eq('id', user.id).single();
                if (!account) {
                    await supabaseClient.from('accounts').insert({ id: user.id, active_tier: 'free', profile_limit: FREE_PROFILE_LIMIT });
                    state.accountData = { active_tier: 'free', profile_limit: FREE_PROFILE_LIMIT };
                } else state.accountData = account;
                const { data: usage } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', user.id).single();
                if (!usage) {
                    const initUsage = { account_id: user.id, usage_count: 0, last_reset_date: new Date().toISOString() };
                    await supabaseClient.from('monthly_usage').upsert(initUsage);
                    state.usageData = { count: 0, resetDate: initUsage.last_reset_date };
                } else state.usageData = { count: usage.usage_count, resetDate: usage.last_reset_date };
                const { data: profiles } = await supabaseClient.from('profiles').select('*').eq('account_id', user.id);
                if (profiles?.length > 0) { document.getElementById('app-container').innerHTML = profilePickerTemplate(profiles); lucide.createIcons(); }
                else { document.getElementById('app-container').innerHTML = createProfileTemplate(); document.getElementById('create-profile-form').addEventListener('submit', handleCreateProfile); lucide.createIcons(); }
            } catch (error) { console.error(error); }
        }

        async function selectProfile(id) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', id).single();
            if (data) { state.activeProfile = data; state.activeTab = 'home'; showMainApp(); }
        }

        async function handleCreateProfile(e) {
            e.preventDefault();
            const name = document.getElementById('profile-name').value.trim();
            const { data, error } = await supabaseClient.from('profiles').insert({ account_id: state.session.user.id, name }).select().single();
            if (!error) { state.activeProfile = data; showMainApp(); }
        }

        async function handleUpgrade(plan) {
            const response = await fetch('/api/create-subscription', { method: 'POST', body: JSON.stringify({ plan, userId: state.session.user.id, email: state.session.user.email }) });
            const data = await response.json();
            if (data.checkoutUrl) window.location.href = data.checkoutUrl;
        }

        async function handleQuizSubmit() {
            if (!state.currentTest?.length) return;
            const btn = document.getElementById('submit-quiz-btn');
            const original = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = "Marking with AI...";
            let correctCount = 0;
            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const exp = block.querySelector('.quiz-feedback-explanation');
                const val = document.querySelector(`input[name="question_${i}"]`)?.value.trim() || (document.querySelector(`input[name="question_${i}"]:checked`)?.value);
                let isCorrect = false;
                if (q.type === 'MCQ' || q.type === 'TrueFalse') isCorrect = val?.toLowerCase() === q.correct_answer.toLowerCase();
                else {
                    const prompt = `Evaluate answer. Question: "${q.question}". Correct: "${q.correct_answer}". Student: "${val}". Reply JSON: {"isCorrect": true/false, "explanation": ""}`;
                    try {
                        const res = JSON.parse(await fetchWithRetry(prompt, true));
                        isCorrect = res.isCorrect;
                        if (exp) {
                            // FIXED BUG: Checks keys and hides if empty
                            exp.innerText = res.explanation || res.feedback || "";
                            if (res.explanation || res.feedback) exp.classList.remove('hidden');
                        }
                    } catch (e) { isCorrect = val?.toLowerCase() === q.correct_answer.toLowerCase(); }
                }
                if (isCorrect) { correctCount++; block.classList.add('correct'); } else block.classList.add('incorrect');
            }
            const resDiv = document.getElementById('quiz-results');
            if (resDiv) resDiv.innerHTML = `<div class="bg-indigo-50 p-4 rounded-lg text-indigo-900 font-bold">Score: ${correctCount}/${state.currentTest.length}</div>`;
            btn.disabled = false; btn.innerHTML = original;
            lucide.createIcons();
        }

        async function loadMyActivity() {
            const out = document.getElementById('my-activity-output');
            const { data } = await supabaseClient.from('saved_work').select('*').eq('profile_id', state.activeProfile.id).order('created_at', { ascending: false });
            if (!data?.length) { out.innerHTML = `<p class="text-center text-gray-500">No activity yet.</p>`; return; }
            state.myActivityData = data;
            out.innerHTML = data.map((item, index) => `
                <div class="bg-white p-4 rounded-lg shadow-sm border flex justify-between items-center">
                    <div class="flex items-center"><i data-lucide="clock" class="text-indigo-500 mr-4"></i><div><h3 class="font-semibold capitalize">${item.work_type.replace(/([A-Z])/g, ' $1')}</h3><p class="text-xs text-gray-400">${new Date(item.created_at).toLocaleDateString()}</p></div></div>
                    <button class="view-work-btn bg-indigo-50 text-indigo-700 font-bold py-2 px-4 rounded-lg" data-work-index="${index}">View</button>
                </div>`).join('');
            lucide.createIcons();
            attachToolEventListeners();
        }

        async function displaySavedWork(work) {
            const main = document.getElementById('main-content');
            const data = work.output_content;
            let html = `<div class="max-w-4xl mx-auto space-y-6"><div class="flex justify-between bg-white p-6 rounded-xl shadow border-l-4 border-indigo-500"><div><h2 class="text-2xl font-bold capitalize">${work.work_type}</h2></div><button id="dl-work" class="bg-gray-100 px-4 py-2 rounded-lg font-bold">Download Word</button></div>`;
            if (work.work_type === 'testBuilder' || data.practice_test) {
                state.currentTest = data.practice_test;
                html += `<div id="quiz-results"></div>${renderPracticeTest(data.practice_test)}`;
            } else if (work.work_type === 'explainSimply') html += createSectionHTML('baby', 'amber', 'Explanation', data.explanation);
            else if (work.work_type === 'learningHub') html += createSectionHTML('book-open', 'indigo', 'Notes', data.revision_notes);
            html += `</div>`;
            main.innerHTML = html;
            lucide.createIcons();
            attachToolEventListeners();
            document.getElementById('dl-work').onclick = async () => saveAs(await window.htmlToDocx.default(main.innerHTML), "Work.docx");
        }

        document.addEventListener('click', (e) => {
            const nav = e.target.closest('[data-nav-link]');
            if (nav) { state.activeTab = nav.dataset.navLink; renderToolContent(); }
            if (e.target.closest('.profile-select-btn')) selectProfile(e.target.closest('.profile-select-btn').dataset.profileId);
            if (e.target.closest('#menu-toggle-btn')) document.getElementById('sidebar').classList.remove('hidden');
            if (e.target.closest('#menu-close-btn')) document.getElementById('sidebar').classList.add('hidden');
            if (e.target.closest('#logout-btn')) supabaseClient.auth.signOut();
        });

        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
