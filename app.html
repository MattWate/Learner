<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Genie - Learner Hub</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/html-to-docx@1.8.0/dist/html-to-docx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
        .prose { max-width: 65ch; }
        .prose-sm { font-size: 0.875rem; line-height: 1.5; }
        .genie-logo { width: 5rem; height: 5rem; }
        @media (min-width: 768px) { .genie-logo { width: 12rem; height: 12rem; } }
        .quiz-question-wrapper.correct { border-left: 4px solid #22c55e; background-color: #f0fdf4; }
        .quiz-question-wrapper.incorrect { border-left: 4px solid #ef4444; background-color: #fef2f2; }
        .quiz-feedback-explanation { font-size: 0.75rem; font-style: italic; margin-top: 0.5rem; color: #4f46e5; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen"></div>

    <script>
        const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';
        const FREE_USAGE_LIMIT = 5;
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            session: null, accountData: null, usageData: { count: 0 },
            activeProfile: null, activeTab: 'home', uploadedImageBase64: null,
            currentTest: null, myActivityData: [] 
        };

        // --- DASHBOARD TEMPLATE ---
        function homePageTemplate() {
            return `
            <div class="max-w-6xl mx-auto space-y-12">
                <div class="bg-white p-8 md:p-12 rounded-xl shadow-xl border-t-4 border-indigo-500 text-center">
                    <i data-lucide="sparkles" class="mx-auto h-16 w-16 text-amber-400"></i>
                    <h1 class="mt-4 text-4xl md:text-5xl font-bold text-gray-800">Welcome, ${state.activeProfile.name}!</h1>
                    <p class="mt-2 text-gray-600">What would you like to achieve today?</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-stretch">
                    <div class="space-y-4 flex flex-col">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center px-2"><i data-lucide="graduation-cap" class="mr-2 text-teal-500"></i> Need help studying?</h2>
                        <div data-nav-link="learningHub" class="bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-teal-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Learning Hub</h3>
                            <p class="text-sm text-gray-500 mt-1">Get full revision notes and practice tests on any topic.</p>
                        </div>
                        <div data-nav-link="testBuilder" class="bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-teal-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Test Builder</h3>
                            <p class="text-sm text-gray-500 mt-1">Create a custom quiz with specific question types.</p>
                        </div>
                    </div>
                    <div class="space-y-4 flex flex-col">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center px-2"><i data-lucide="help-circle" class="mr-2 text-rose-500"></i> Help with homework?</h2>
                        <div data-nav-link="homeworkHelper" class="bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-rose-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Homework Helper</h3>
                            <p class="text-sm text-gray-500 mt-1">Upload a photo for hints and step-by-step guidance.</p>
                        </div>
                        <div data-nav-link="explainSimply" class="bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-rose-400 flex-1">
                            <h3 class="font-bold text-gray-800 text-lg">Explain It Simply</h3>
                            <p class="text-sm text-gray-500 mt-1">Get easy-to-understand explanations for tricky topics.</p>
                        </div>
                    </div>
                    <div class="space-y-4 flex flex-col">
                        <h2 class="text-xl font-bold text-gray-700 flex items-center px-2"><i data-lucide="plus-circle" class="mr-2 text-violet-500"></i> Math support?</h2>
                        <div data-nav-link="mathHub" class="bg-white p-6 rounded-xl shadow hover:shadow-lg cursor-pointer border-l-4 border-violet-400 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">Math Hub</h3>
                                <p class="text-sm text-gray-500 mt-1">Master calculations with Python-powered accuracy.</p>
                            </div>
                            <div class="mt-4 text-xs font-bold text-violet-600 flex items-center"><i data-lucide="zap" class="w-3 h-3 mr-1"></i> LOGIC READY</div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // --- RESTORED UNABRIDGED TOOL TEMPLATES ---
        const learningHubTemplate = `<div class="max-w-4xl mx-auto"><div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500"><h2 class="text-3xl font-bold text-gray-800 mb-2">Learning Hub</h2><p class="text-gray-500 mb-8">Enter a topic to get revision notes and a practice test.</p><textarea id="learn-topic" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:ring-indigo-500" placeholder="e.g., The planets in our solar system"></textarea><button id="generate-learning-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Help Me Learn</button></div><div id="lh-output" class="mt-8"></div></div>`;
        
        const testBuilderTemplate = `<div class="max-w-4xl mx-auto"><div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-teal-500"><h2 class="text-3xl font-bold text-gray-800 mb-2">Test Builder</h2><p class="text-gray-500 mb-8">Create a custom practice test on any topic.</p><div class="space-y-6 mb-8"><textarea id="tb-topic" rows="3" class="w-full px-4 py-2 border rounded-lg" placeholder="e.g., World War 2 Key Battles"></textarea><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-medium text-gray-700">Number of Questions</label><select id="tb-num" class="w-full mt-1 border rounded-lg px-3 py-2"><option value="5">5</option><option value="10" selected>10</option><option value="20">20</option></select></div><div><label class="block text-sm font-medium text-gray-700">Question Types</label><div class="mt-2 space-y-1"><label class="flex items-center text-sm"><input type="checkbox" id="tb-mcq" checked class="mr-2"> MCQ</label><label class="flex items-center text-sm"><input type="checkbox" id="tb-tf" checked class="mr-2"> True/False</label><label class="flex items-center text-sm"><input type="checkbox" id="tb-short" checked class="mr-2"> Short Answer</label></div></div></div></div><button id="generate-tb-btn" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg hover:bg-teal-700 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Generate Test</button></div><div id="tb-output" class="mt-8"></div></div>`;

        const homeworkHelperTemplate = `<div class="max-w-4xl mx-auto"><div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-rose-400"><h2 class="text-3xl font-bold text-gray-800 mb-2">Homework Helper</h2><textarea id="hh-question" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4" placeholder="Type your question here..."></textarea><div class="border-2 border-dashed border-gray-300 p-6 text-center rounded-lg mb-4 relative"><input type="file" id="image-upload" class="hidden" accept="image/*"><label for="image-upload" class="cursor-pointer text-indigo-600 font-bold hover:text-indigo-800">Click to upload worksheet photo</label><div id="image-preview-wrapper" class="hidden mt-4"><img id="image-preview" class="max-h-64 mx-auto rounded shadow-lg"><button id="remove-img" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1"><i data-lucide="x" class="w-4 h-4"></i></button></div></div><button id="generate-hh-btn" class="w-full bg-rose-500 text-white font-bold py-3 rounded-lg hover:bg-rose-600 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Get Help</button></div><div id="hh-output" class="mt-8"></div></div>`;

        const explainSimplyTemplate = `<div class="max-w-4xl mx-auto"><div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-amber-400"><h2 class="text-3xl font-bold text-gray-800 mb-2">Explain It Simply</h2><textarea id="explain-topic" rows="4" class="w-full px-4 py-2 border rounded-lg mb-6" placeholder="What should I explain in simple terms?"></textarea><button id="generate-es-btn" class="w-full bg-amber-500 text-white font-bold py-3 rounded-lg hover:bg-amber-600 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Explain</button></div><div id="es-output" class="mt-8"></div></div>`;

        const mathHubTemplate = `<div class="max-w-4xl mx-auto"><div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-violet-500"><h2 class="text-3xl font-bold text-gray-800 mb-2">Math Hub</h2><p class="text-gray-500 mb-8">Computational accuracy powered by Python logic.</p><div class="text-center p-12 bg-slate-50 rounded-xl border-2 border-dashed border-slate-200"><i data-lucide="brain-circuit" class="mx-auto h-16 w-16 text-violet-300"></i><h3 class="mt-4 text-lg font-semibold text-slate-700">Math logic engine initializing...</h3><p class="mt-1 text-slate-500">Phase 2 Backend connection in progress.</p></div></div></div>`;

        // --- UTILS & CORE ENGINE ---
        function shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }

        async function fetchWithRetry(prompt, isJson, imageData = null) {
            const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, isJson, imageData }) });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        function createSectionHTML(icon, color, title, content) {
            const cleanMarkdown = (text) => String(text).replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return `<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-4"><h3 class="text-lg font-semibold text-gray-800 flex items-center mb-3"><i data-lucide="${icon}" class="text-${color}-500 mr-2"></i>${title}</h3><div class="prose-sm text-gray-600">${cleanMarkdown(content)}</div></div>`;
        }

        function renderPracticeTest(testData) {
            if (!testData || !testData.length) return "";
            let html = '<form id="quiz-form" class="space-y-6 mt-8">';
            testData.forEach((q, i) => {
                html += `<div id="question-block-${i}" class="quiz-question-wrapper border-l-4 border-gray-200 p-6 rounded-r-lg bg-white shadow-sm">`;
                html += `<p class="font-semibold text-gray-800 mb-4">${i + 1}. ${q.question}</p>`;
                if (q.type === 'MCQ' || q.type === 'TrueFalse') {
                    if(q.options) shuffleArray(q.options);
                    q.options?.forEach(opt => { html += `<label class="flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer transition"><input type="radio" name="q_${i}" value="${opt}" class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500"><span class="ml-3 text-gray-700">${opt}</span></label>`; });
                } else {
                    html += `<input type="text" name="q_${i}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500" placeholder="Type your answer here...">`;
                }
                html += `<div class="quiz-feedback-explanation hidden p-3 mt-4 bg-indigo-50 rounded-lg text-sm italic text-indigo-700 border-l-4 border-indigo-300"></div></div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition shadow-lg">Check My Answers</button></form>`;
            return html;
        }

        async function handleQuizSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-quiz-btn');
            const original = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = "AI is marking your work...";
            let score = 0;

            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const fb = block.querySelector('.quiz-feedback-explanation');
                const userVal = q.type === 'ShortAnswer' ? document.querySelector(`[name="q_${i}"]`).value.trim() : document.querySelector(`[name="q_${i}"]:checked`)?.value;

                let isCorrect = false;
                if (q.type !== 'ShortAnswer') {
                    isCorrect = userVal?.toLowerCase() === q.correct_answer?.toLowerCase();
                } else if (userVal) {
                    const prompt = `Pedagogical Evaluator: Question: "${q.question}". Expected Concept: "${q.correct_answer}". Student Answer: "${userVal}". Is it conceptually correct? Allow minor typos. Reply ONLY JSON: {"isCorrect":true/false, "explanation":"1 sentence why."}`;
                    try {
                        const res = JSON.parse(await fetchWithRetry(prompt, true));
                        isCorrect = res.isCorrect;
                        if(fb) { fb.innerText = res.explanation || ""; fb.classList.remove('hidden'); }
                    } catch (e) { isCorrect = userVal.toLowerCase() === q.correct_answer.toLowerCase(); }
                }

                block.className = `quiz-question-wrapper border-l-4 p-6 rounded-r-lg mb-4 shadow-sm ${isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                if(isCorrect) score++;
            }
            btn.innerHTML = `Quiz Finished! Your Score: ${score}/${state.currentTest.length}`;
            lucide.createIcons();
        }

        // --- RESTORED TOOL LOGIC HANDLERS ---
        async function runLearningHub() {
            const topic = document.getElementById('learn-topic').value;
            const out = document.getElementById('lh-output');
            if(!topic) return;
            out.innerHTML = `<div class="text-center p-8"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div><p class="mt-4 text-gray-500">Building your learning guide...</p></div>`;
            const prompt = `You are an AI teacher. Create a JSON object for the topic "${topic}" with keys: "learning_objectives" (bullet list), "revision_notes" (detailed notes), and "practice_test" (array of 5 questions with "question", "type" (MCQ/TrueFalse/ShortAnswer), "options" (if MCQ/TF), and "correct_answer").`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = `
                    ${createSectionHTML('check-circle', 'green', 'Learning Objectives', data.learning_objectives)}
                    ${createSectionHTML('book-open', 'indigo', 'Revision Notes', data.revision_notes)}
                    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mt-6">
                        <h3 class="text-xl font-bold text-gray-800 mb-2">Practice Test</h3>
                        ${renderPracticeTest(data.practice_test)}
                    </div>`;
                lucide.createIcons();
                document.getElementById('quiz-form')?.addEventListener('submit', handleQuizSubmit);
            } catch(e) { out.innerHTML = `<p class="text-red-500">Failed to generate guide. Please try again.</p>`; }
        }

        async function runTestBuilder() {
            const topic = document.getElementById('tb-topic').value;
            const num = document.getElementById('tb-num').value;
            const out = document.getElementById('tb-output');
            if(!topic) return;
            out.innerHTML = `<div class="text-center p-8"><p class="text-gray-500 animate-pulse">Generating your custom exam...</p></div>`;
            const types = [];
            if(document.getElementById('tb-mcq').checked) types.push('MCQ');
            if(document.getElementById('tb-tf').checked) types.push('TrueFalse');
            if(document.getElementById('tb-short').checked) types.push('ShortAnswer');
            const prompt = `Create a ${num}-question test on "${topic}". Use types: ${types.join(',')}. JSON: {"practice_test":[{"question":"", "type":"", "options":[], "correct_answer":""}]}`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = renderPracticeTest(data.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form')?.addEventListener('submit', handleQuizSubmit);
            } catch(e) { out.innerHTML = `<p class="text-red-500">Error.</p>`; }
        }

        async function runHomeworkHelper() {
            const q = document.getElementById('hh-question').value;
            const out = document.getElementById('hh-output');
            out.innerHTML = `<div class="animate-pulse text-rose-500 font-bold">Analyzing worksheet...</div>`;
            const prompt = `Analyze: "${q}". If image provided, extract text first. Respond ONLY JSON: {"hints": ["hint 1", "hint 2"], "answer": "final answer"}`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true, state.uploadedImageBase64));
                out.innerHTML = createSectionHTML('lightbulb', 'yellow', 'Helpful Hints', data.hints.join('<br>')) + createSectionHTML('key-round', 'green', 'Final Answer', data.answer);
                lucide.createIcons();
            } catch(e) { out.innerHTML = `<p class="text-red-500">Error analyzing homework.</p>`; }
        }

        function attachToolEventListeners() {
            document.getElementById('generate-learning-btn')?.addEventListener('click', runLearningHub);
            document.getElementById('generate-tb-btn')?.addEventListener('click', runTestBuilder);
            document.getElementById('generate-hh-btn')?.addEventListener('click', runHomeworkHelper);
            document.getElementById('generate-es-btn')?.addEventListener('click', async () => {
                const topic = document.getElementById('explain-topic').value;
                document.getElementById('es-output').innerHTML = "Simplifying concept...";
                const res = await fetchWithRetry(`Explain "${topic}" to a 10 year old using simple language and analogies.`, false);
                document.getElementById('es-output').innerHTML = createSectionHTML('baby', 'amber', 'Simple Explanation', res);
                lucide.createIcons();
            });
            document.getElementById('image-upload')?.addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            });
            document.getElementById('remove-img')?.addEventListener('click', () => { state.uploadedImageBase64 = null; document.getElementById('image-preview-wrapper').classList.add('hidden'); });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
        }

        // --- NAVIGATION & SHELL ---
        function renderToolContent() {
            const main = document.getElementById('main-content');
            switch (state.activeTab) {
                case 'home': main.innerHTML = homePageTemplate(); break;
                case 'learningHub': main.innerHTML = learningHubTemplate; break;
                case 'testBuilder': main.innerHTML = testBuilderTemplate; break;
                case 'homeworkHelper': main.innerHTML = homeworkHelperTemplate; break;
                case 'explainSimply': main.innerHTML = explainSimplyTemplate; break;
                case 'mathHub': main.innerHTML = mathHubTemplate; break;
                case 'myActivity': main.innerHTML = `<div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500"><h2 class="text-3xl font-bold mb-4">Activity History</h2><div id="my-activity-output" class="space-y-4"></div></div>`; break;
            }
            const nav = document.getElementById('sidebar-nav');
            const usage = document.getElementById('usage-prompt-wrapper');
            const tabs = [{id:'home', icon:'home', label:'Home'}, {id:'learningHub', icon:'book-marked', label:'Learning Hub'}, {id:'homeworkHelper', icon:'life-buoy', label:'Homework Help'}, {id:'explainSimply', icon:'baby', label:'Explain Simply'}, {id:'mathHub', icon:'calculator', label:'Math Hub'}, {id:'testBuilder', icon:'clipboard-check', label:'Test Builder'}, {id:'myActivity', icon:'history', label:'My Activity'}];
            nav.innerHTML = tabs.map(t => `<button data-nav-link="${t.id}" class="flex items-center w-full px-4 py-2 rounded-lg ${state.activeTab === t.id ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'} capitalize mb-1 transition-all"><i data-lucide="${t.icon}" class="w-5 h-5 mr-3"></i>${t.label}</button>`).join('');
            
            const isFree = state.accountData?.active_tier === 'free';
            usage.innerHTML = isFree ? `<div class="p-3 bg-indigo-50 rounded-lg text-center border border-indigo-100"><p class="text-xs font-bold text-indigo-700">Trial: ${FREE_USAGE_LIMIT - state.usageData.count}/${FREE_USAGE_LIMIT} Left</p></div>` : `<div class="p-3 bg-green-50 rounded-lg text-center font-bold text-green-700 text-xs border border-green-100 italic">UNLIMITED PLAN ACTIVE</div>`;
            
            lucide.createIcons();
            attachToolEventListeners();
        }

        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else { 
                state.session = session;
                const { data: acc } = await supabaseClient.from('accounts').select('*').eq('id', session.user.id).single();
                state.accountData = acc || { active_tier: 'free' };
                const { data: usg } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', session.user.id).single();
                state.usageData = { count: usg?.usage_count || 0 };
                const { data: profs } = await supabaseClient.from('profiles').select('*').eq('account_id', session.user.id);
                state.activeProfile = profs?.[0];
                document.getElementById('app-container').innerHTML = `<div class="min-h-screen md:flex"><aside id="sidebar" class="w-64 bg-white border-r p-4 hidden md:flex flex-col h-screen sticky top-0"><div data-nav-link="home" class="mb-8 text-center cursor-pointer group"><img src="/logo.svg" class="h-16 mx-auto group-hover:scale-110 transition"><h1 class="font-bold text-gray-800 mt-2 text-xl">Learning Genie</h1></div><nav id="sidebar-nav" class="flex-1"></nav><div id="usage-prompt-wrapper" class="mt-auto border-t pt-4"></div><button id="logout-btn" class="mt-4 flex items-center px-4 py-2 text-gray-400 hover:text-indigo-600 transition"><i data-lucide="log-out" class="w-4 h-4 mr-2"></i>Sign Out</button></aside><main id="main-content" class="flex-1 p-4 md:p-8 bg-slate-50 overflow-y-auto"></main></div>`;
                renderToolContent();
            }
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) { state.activeTab = link.dataset.navLink; renderToolContent(); }
        });
        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
