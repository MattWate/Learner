        // --- CORE AUTH & ACCOUNT LOGIC ---
        async function handleAuth() {
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_OUT') {
                    state.session = null;
                    state.activeProfile = null;
                    window.location.href = '/login.html';
                }
            });

            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (error || !session) {
                window.location.href = '/login.html';
                return;
            }
            state.session = session;
            await checkAccountStatus(session.user);
        }

        async function checkAccountStatus(user) {
            try {
                const { data: account, error: accountError } = await supabaseClient
                    .from('accounts')
                    .select('active_tier, profile_limit')
                    .eq('id', user.id)
                    .single();

                if (!account) {
                    const { error: insertError } = await supabaseClient
                        .from('accounts')
                        .insert({ id: user.id, active_tier: 'free', profile_limit: FREE_PROFILE_LIMIT });
                    state.accountData = { active_tier: 'free', profile_limit: FREE_PROFILE_LIMIT };
                } else {
                    state.accountData = account;
                }

                const { data: usage } = await supabaseClient
                    .from('monthly_usage')
                    .select('usage_count, last_reset_date')
                    .eq('account_id', user.id)
                    .single();
                
                if (!usage) {
                    const initialUsage = { account_id: user.id, usage_count: 0, last_reset_date: new Date().toISOString() };
                    await supabaseClient.from('monthly_usage').upsert(initialUsage);
                    state.usageData = { count: 0, resetDate: initialUsage.last_reset_date };
                } else {
                    state.usageData = { count: usage.usage_count, resetDate: usage.last_reset_date };
                }
                
                const { data: profiles } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('account_id', user.id);

                if (profiles && profiles.length > 0) {
                    document.getElementById('app-container').innerHTML = profilePickerTemplate(profiles);
                    lucide.createIcons();
                } else {
                    document.getElementById('app-container').innerHTML = createProfileTemplate();
                    document.getElementById('create-profile-form').addEventListener('submit', handleCreateProfile);
                    lucide.createIcons();
                }
            } catch (err) { console.error("Status Error:", err); }
        }

        async function selectProfile(profileId) {
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', profileId).single();
            if (data) {
                state.activeProfile = data;
                state.activeTab = 'home';
                showMainApp();
            }
        }

        // --- STABILITY ENGINE: FETCH WITH RETRY ---
        async function fetchWithRetry(prompt, isJson, retries = 2, requestType = 'text', imageData = null) {
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, isJson, requestType, imageData })
                });

                if (!response.ok) {
                    const errorBody = await response.json();
                    throw new Error(errorBody.error || `API Error ${response.status}`);
                }
                
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("Empty AI response");
                return text;
            } catch (error) {
                if (retries > 0) {
                    console.warn("Retrying AI request...", retries);
                    await new Promise(r => setTimeout(r, 1500));
                    return fetchWithRetry(prompt, isJson, retries - 1, requestType, imageData);
                }
                throw error;
            }
        }

                `;
            }
            lucide.createIcons();
        }
        // --- TOOL LOGIC HANDLERS ---
        async function handleQuizSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-quiz-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = `<div class="flex items-center justify-center"><div class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full mr-2"></div> Marking...</div>`;
            
            let correctCount = 0;
            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const fb = block.querySelector('.quiz-feedback-explanation');
                let userVal;
                let isCorrect = false;

                if (q.type === 'MCQ' || q.type === 'TrueFalse') {
                    const selected = document.querySelector(`input[name="question_${i}"]:checked`);
                    userVal = selected ? selected.value : null;
                    isCorrect = userVal && userVal.toLowerCase() === q.correct_answer.toLowerCase();
                } else {
                    userVal = document.querySelector(`input[name="question_${i}"]`).value.trim();
                    if (userVal) {
                        const gradingPrompt = `Pedagogical Evaluator: Grade this student answer. 
                        Question: "${q.question}" 
                        Correct Concept: "${q.correct_answer}" 
                        Student Answer: "${userVal}". 
                        Is it conceptually correct? Respond ONLY with JSON: {"isCorrect": true/false, "explanation": "1-sentence why."}`;
                        try {
                            const resJson = await fetchWithRetry(gradingPrompt, true);
                            const evaluation = JSON.parse(resJson);
                            isCorrect = evaluation.isCorrect;
                            if (fb) {
                                fb.innerText = evaluation.explanation || "";
                                fb.classList.remove('hidden');
                            }
                        } catch (e) { isCorrect = userVal.toLowerCase() === q.correct_answer.toLowerCase(); }
                    }
                }
                block.classList.toggle('correct', isCorrect);
                block.classList.toggle('incorrect', !isCorrect);
                if (isCorrect) correctCount++;
            }
            btn.innerHTML = `Finished! Your Score: ${correctCount}/${state.currentTest.length}`;
            lucide.createIcons();
        }

        async function handleGenerateLearningHelp() {
            if (!await checkAndIncrementUsage()) return;
            const topic = document.getElementById('learn-topic').value;
            const out = document.getElementById('lh-output');
            if(!topic) return;
            out.innerHTML = `<div class="text-center p-12 bg-white rounded-2xl shadow-xl mt-8 animate-pulse text-indigo-600 font-bold">Gemini is building your custom learning guide...</div>`;
            
            const prompt = `You are an expert tutor. For the topic "${topic}", provide a JSON object with: 
            "learning_objectives" (bullet points), 
            "revision_notes" (detailed notes in markdown), 
            "practice_test" (array of 5 questions with question, type (MCQ/TrueFalse/ShortAnswer), options, correct_answer).`;
            
            try {
                const text = await fetchWithRetry(prompt, true);
                const data = JSON.parse(text);
                state.currentTest = data.practice_test;
                out.innerHTML = `
                    ${createSectionHTML('check-circle', 'green', 'Learning Objectives', data.learning_objectives)}
                    ${createSectionHTML('book-open', 'indigo', 'Revision Notes', data.revision_notes)}
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-indigo-500 mt-8">
                        <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><i data-lucide="clipboard-list" class="mr-2 text-indigo-500"></i>Practice Test</h3>
                        ${renderPracticeTest(data.practice_test)}
                    </div>`;
                document.getElementById('quiz-form').addEventListener('submit', handleQuizSubmit);
                lucide.createIcons();
                saveWorkToDB('learningHub', {topic}, data);
            } catch(e) { out.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-xl">Error generating content. Please try again.</div>`; }
        }

        // --- FINAL RENDERING ENGINE ---
        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="min-h-screen md:flex">
                    <aside id="sidebar" class="w-72 bg-white border-r border-gray-100 p-6 hidden md:flex flex-col h-screen sticky top-0 shadow-sm">
                        <div data-nav-link="home" class="mb-12 text-center cursor-pointer group">
                            <img src="/logo.svg" class="h-24 mx-auto group-hover:scale-110 transition-transform duration-300">
                            <h1 class="font-black text-gray-800 mt-4 text-2xl tracking-tight">Learning Genie</h1>
                        </div>
                        <nav id="sidebar-nav" class="flex-1"></nav>
                        <div id="usage-prompt-wrapper" class="mt-auto border-t border-gray-50 pt-8"></div>
                        <button id="logout-btn" class="mt-6 flex items-center px-4 py-3 text-gray-400 hover:text-rose-600 transition-colors font-bold"><i data-lucide="log-out" class="w-5 h-5 mr-3"></i>Sign Out</button>
                    </aside>
                    <main id="main-content" class="flex-1 p-6 md:p-12 bg-[#fdfdff] overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const main = document.getElementById('main-content');
            switch (state.activeTab) {
                case 'home': main.innerHTML = homePageTemplate(); break;
                case 'learningHub': main.innerHTML = learningHubTemplate; break;
                case 'homeworkHelper': main.innerHTML = homeworkHelperTemplate; break;
                case 'explainSimply': main.innerHTML = explainSimplyTemplate; break;
                case 'testBuilder': main.innerHTML = testBuilderTemplate; break;
                case 'mathHub': main.innerHTML = mathHubTemplate; break;
                case 'myActivity': main.innerHTML = myActivityTemplate(); break;
                case 'upgrade': main.innerHTML = upgradeTemplate(); break;
            }
            updateSidebar();
            lucide.createIcons();
            attachListeners();
        }

        function attachListeners() {
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleGenerateLearningHelp);
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', async () => {
                const q = document.getElementById('hh-question').value;
                const out = document.getElementById('hh-output');
                out.innerHTML = "Analyzing...";
                const res = JSON.parse(await fetchWithRetry(`Analyze "${q}". JSON: {"hints":[], "answer":""}`, true, 2, 'text', state.uploadedImageBase64));
                out.innerHTML = createSectionHTML('lightbulb', 'yellow', 'Hints', res.hints.join('<br>')) + createSectionHTML('key', 'green', 'Check Answer', res.answer);
                lucide.createIcons();
            });
            document.getElementById('image-upload')?.addEventListener('change', (e) => {
                const r = new FileReader();
                r.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                };
                r.readAsDataURL(e.target.files[0]);
            });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) { state.activeTab = link.dataset.navLink; renderToolContent(); }
            if (e.target.closest('.profile-select-btn')) selectProfile(e.target.closest('.profile-select-btn').dataset.profileId);
        });

        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
