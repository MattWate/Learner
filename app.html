            } else if (reason === 'profiles') {
                 title = "Profile Limit Reached";
                 message = `You have reached your limit of ${state.accountData.profile_limit} learner profile(s). Upgrade your plan to add more profiles.`;
            }
            return `
                <i data-lucide="lock" class="h-12 w-12 text-rose-500 mx-auto mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">${title}</h2>
                <p class="text-gray-600 mb-6">${message}</p>
                <button id="close-paywall-modal-btn" class="mt-4 mr-2 bg-gray-200 text-gray-800 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300">Close</button>
                <button data-nav-link="upgrade" class="mt-4 ml-2 bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700">Upgrade Now</button>`;
        };
        
        const createProfileTemplate = (message = 'Create your first learner profile.') => `
            <div class="min-h-screen flex items-center justify-center bg-gradient-to-b from-indigo-50 to-white p-4">
                <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-2xl text-center">
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">Create Learner Profile</h1>
                    <form id="create-profile-form">
                        <label for="profile-name" class="block text-sm font-medium text-gray-700 text-left mb-1">Profile Name</label>
                        <input type="text" id="profile-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4" required placeholder="e.g., Alex">
                        <button type="submit" id="create-profile-btn" class="w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700">Create Profile</button>
                    </form>
                </div>
            </div>`;

        // --- UTILITY FUNCTIONS ---
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function renderPracticeTest(testData) {
            if (!testData || testData.length === 0) return "<p>No questions found.</p>";
            let html = '<form id="quiz-form" class="space-y-6">';
            testData.forEach((question, index) => {
                html += `<div id="question-block-${index}" class="quiz-question-wrapper border-l-4 border-gray-200 p-4 rounded-r-lg bg-white shadow-sm mb-4">`;
                html += `<p class="font-semibold text-gray-800 mb-3">${index + 1}. ${question.question}</p>`;
                html += `<div class="space-y-2">`;
                if (question.type === 'MCQ' || question.type === 'TrueFalse') {
                    if(question.options) shuffleArray(question.options);
                    question.options.forEach((option) => {
                        html += `<label class="flex items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer transition"><input type="radio" name="question_${index}" value="${option}" class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500"><span class="ml-3 text-sm text-gray-700">${option}</span></label>`;
                    });
                } else if (question.type === 'ShortAnswer') {
                    html += `<input type="text" name="question_${index}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500" placeholder="Type your answer here...">`;
                }
                html += `</div><div class="quiz-feedback-explanation text-xs italic mt-2 text-indigo-600 hidden"></div></div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 flex items-center justify-center disabled:bg-green-300">Check My Answers</button></form>`;
            return html;
        }

        function createSectionHTML(icon, color, title, content) {
            const cleanMarkdown = (text) => String(text).replace(/\*\*\*(.*?)\*\*\*/g, '<hr class="my-4 border-gray-200"><strong><em>$1</em></strong><hr class="my-4 border-gray-200">').replace(/\*\*/g, '').replace(/\*/g, '').replace(/## /g, '<h3 class="text-md font-semibold mt-4">').replace(/\n/g, '<br>');
            return `<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-4"><h3 class="text-lg font-semibold text-gray-800 flex items-center mb-3"><i data-lucide="${icon}" class="text-${color}-500"></i><span class="ml-2">${title}</span></h3><div class="prose prose-sm max-w-none text-gray-600">${cleanMarkdown(content)}</div></div>`;
        }

        // --- CORE LOGIC FUNCTIONS ---

        async function fetchWithRetry(prompt, isJson, retries = 1, requestType = 'text', imageData = null) {
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, isJson, requestType, imageData })
                });
                const result = await response.json();
                return result.candidates[0].content.parts[0].text;
            } catch (error) {
                if (retries > 0) return fetchWithRetry(prompt, isJson, retries - 1, requestType, imageData);
                throw error;
            }
        }

        async function handleQuizSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-quiz-btn');
            const originalBtnText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white mr-3"></div> Marking...`;
            
            let correctCount = 0;
            for (let index = 0; index < state.currentTest.length; index++) {
                const question = state.currentTest[index];
                const questionBlock = document.getElementById(`question-block-${index}`);
                const feedbackExpEl = questionBlock.querySelector('.quiz-feedback-explanation');
                let userAnswer;
                let isCorrect = false;
                
                if (question.type === 'MCQ' || question.type === 'TrueFalse') {
                    const selectedOption = document.querySelector(`input[name="question_${index}"]:checked`);
                    userAnswer = selectedOption ? selectedOption.value : null;
                    isCorrect = userAnswer && userAnswer.toLowerCase() === question.correct_answer.toLowerCase();
                } else if (question.type === 'ShortAnswer') {
                    userAnswer = document.querySelector(`input[name="question_${index}"]`).value.trim();
                    if (userAnswer) {
                        const gradingPrompt = `Pedagogical Evaluator: Evaluate student answer. Question: "${question.question}" Correct Concept: "${question.correct_answer}" Student Answer: "${userAnswer}". Reply ONLY with JSON: {"isCorrect": true/false, "explanation": "1-sentence why."}`;
                        try {
                            const resJson = await fetchWithRetry(gradingPrompt, true);
                            const evaluation = JSON.parse(resJson);
                            isCorrect = evaluation.isCorrect;
                            if (feedbackExpEl) {
                                feedbackExpEl.innerText = evaluation.explanation || evaluation.feedback || "";
                                feedbackExpEl.classList.toggle('hidden', !(evaluation.explanation || evaluation.feedback));
                            }
                        } catch (e) { isCorrect = userAnswer.toLowerCase() === question.correct_answer.toLowerCase(); }
                    }
                }
                questionBlock.classList.toggle('correct', isCorrect);
                questionBlock.classList.toggle('incorrect', !isCorrect);
                if (isCorrect) correctCount++;
            }
            btn.disabled = false; btn.innerHTML = `Finished! Score: ${correctCount}/${state.currentTest.length}`;
            lucide.createIcons();
        }

        async function handleGenerateLearningHelp() {
            const topic = document.getElementById('learn-topic').value;
            const out = document.getElementById('lh-output');
            if(!topic) return;
            out.innerHTML = `<div class="text-center p-8"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div><p class="mt-4 text-gray-500">Building your learning guide...</p></div>`;
            const prompt = `You are a helpful student tutor. Analyze the topic "${topic}". Provide a JSON object with: "learning_objectives" (list), "revision_notes" (comprehensive sections), and "practice_test" (array of 5-7 questions with question, type (MCQ/TrueFalse/ShortAnswer), options (if MCQ/TF), and correct_answer).`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = createSectionHTML('check-circle', 'green', 'Objectives', data.learning_objectives) + createSectionHTML('book-open', 'indigo', 'Notes', data.revision_notes) + renderPracticeTest(data.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form').addEventListener('submit', handleQuizSubmit);
                saveWork('learningHub', {topic}, data);
            } catch(e) { out.innerHTML = "Error generating content."; }
        }

        async function handleGenerateTestBuilder() {
            const topic = document.getElementById('tb-topic').value;
            const num = document.getElementById('tb-num-questions').value;
            const types = [];
            if(document.getElementById('tb-qt-mcq').checked) types.push('MCQ');
            if(document.getElementById('tb-qt-tf').checked) types.push('TrueFalse');
            if(document.getElementById('tb-qt-short').checked) types.push('ShortAnswer');
            const out = document.getElementById('tb-output');
            if(!topic) return;
            out.innerHTML = "Generating...";
            const prompt = `Create a ${num}-question test on "${topic}" using types: ${types.join(',')}. Respond with JSON: {"practice_test": [{"question":"", "type":"", "options":[], "correct_answer":""}]}`;
            try {
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = renderPracticeTest(data.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form').addEventListener('submit', handleQuizSubmit);
                saveWork('testBuilder', {topic}, data);
            } catch(e) { out.innerHTML = "Error."; }
        }

        async function saveWork(type, input, output) {
            await supabaseClient.from('saved_work').insert({ profile_id: state.activeProfile.id, work_type: type, input_prompt: input, output_content: output });
        }

        // --- NAVIGATION & SHELL ---
        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="min-h-screen md:flex">
                    <aside id="sidebar" class="w-64 bg-white border-r p-4 hidden md:flex flex-col h-screen sticky top-0">
                        <div data-nav-link="home" class="mb-8 text-center cursor-pointer group"><img src="/logo.svg" class="h-16 mx-auto group-hover:scale-110 transition"><h1 class="font-bold text-gray-800 mt-2 text-xl">Learning Genie</h1></div>
                        <nav id="sidebar-nav" class="space-y-2 flex-1"></nav>
                        <div id="usage-prompt-wrapper" class="mt-auto border-t pt-4"></div>
                        <button id="logout-btn" class="mt-4 flex items-center px-4 py-2 text-gray-400 hover:text-gray-600 transition"><i data-lucide="log-out" class="w-4 h-4 mr-2"></i>Sign Out</button>
                    </aside>
                    <main id="main-content" class="flex-1 p-4 md:p-8 bg-slate-50 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const main = document.getElementById('main-content');
            switch (state.activeTab) {
                case 'home': main.innerHTML = homePageTemplate(); break;
                case 'learningHub': main.innerHTML = learningHubTemplate; break;
                case 'testBuilder': main.innerHTML = testBuilderTemplate; break;
                case 'homeworkHelper': main.innerHTML = homeworkHelperTemplate; break;
                case 'explainSimply': main.innerHTML = explainSimplyTemplate; break;
                case 'mathHub': main.innerHTML = mathHubTemplate; break;
                case 'myActivity': main.innerHTML = myActivityTemplate(); break;
                case 'upgrade': main.innerHTML = upgradeTemplate(); break;
            }
            updateSidebar();
            lucide.createIcons();
            attachListeners();
            if(state.activeTab === 'myActivity') loadActivity();
        }

        function updateSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const usage = document.getElementById('usage-prompt-wrapper');
            const tabs = [
                {id:'home', icon:'home', label:'Home'},
                {id:'learningHub', icon:'book-marked', label:'Study Hub'},
                {id:'homeworkHelper', icon:'life-buoy', label:'Homework'},
                {id:'explainSimply', icon:'baby', label:'Explain Simply'},
                {id:'mathHub', icon:'calculator', label:'Math Hub'},
                {id:'testBuilder', icon:'clipboard-check', label:'Test Builder'},
                {id:'myActivity', icon:'history', label:'Activity'}
            ];
            nav.innerHTML = tabs.map(t => `<button data-nav-link="${t.id}" class="flex items-center w-full px-4 py-2 rounded-lg ${state.activeTab === t.id ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'} capitalize mb-1 transition-all"><i data-lucide="${t.icon}" class="w-5 h-5 mr-3"></i>${t.label}</button>`).join('');
            
            const isFree = state.accountData?.active_tier === 'free';
            usage.innerHTML = isFree ? `<div class="p-3 bg-indigo-50 rounded-lg text-center border border-indigo-100"><p class="text-xs font-bold text-indigo-700">Trial: ${FREE_USAGE_LIMIT - state.usageData.count}/${FREE_USAGE_LIMIT} Left</p></div>` : `<div class="p-3 bg-green-50 rounded-lg text-center font-bold text-green-700 text-xs italic">UNLIMITED PLAN ACTIVE</div>`;
        }

        function attachListeners() {
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleGenerateLearningHelp);
            document.getElementById('generate-test-builder-btn')?.addEventListener('click', handleGenerateTestBuilder);
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', async () => {
                const q = document.getElementById('hh-question').value;
                const out = document.getElementById('hh-output');
                out.innerHTML = "Analyzing...";
                const prompt = `Student Homework Assistant: Analyze question "${q}". Provide JSON with "hints" (array) and "answer" (string).`;
                const data = JSON.parse(await fetchWithRetry(prompt, true, 1, 'text', state.uploadedImageBase64));
                out.innerHTML = createSectionHTML('lightbulb', 'yellow', 'Hints', data.hints.join('<br>')) + createSectionHTML('key', 'green', 'Answer', data.answer);
                saveWork('homeworkHelper', {q}, data);
            });
            document.getElementById('generate-explanation-btn')?.addEventListener('click', async () => {
                const t = document.getElementById('explain-topic').value;
                document.getElementById('es-output').innerHTML = "Simplifying...";
                const res = await fetchWithRetry(`Explain ${t} to a 10 year old using simple language and analogies.`, false);
                document.getElementById('es-output').innerHTML = createSectionHTML('baby', 'amber', 'Simple Explanation', res);
            });
            document.getElementById('image-upload')?.addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
        }

        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else { 
                state.session = session;
                const { data: acc } = await supabaseClient.from('accounts').select('*').eq('id', session.user.id).single();
                state.accountData = acc || { active_tier: 'free' };
                const { data: usg } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', session.user.id).single();
                state.usageData = { count: usg?.usage_count || 0 };
                const { data: profs } = await supabaseClient.from('profiles').select('*').eq('account_id', session.user.id);
                state.activeProfile = profs?.[0];
                showMainApp();
            }
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) { state.activeTab = link.dataset.navLink; renderToolContent(); }
        });
        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
