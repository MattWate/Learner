<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Genie - Learner Hub</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/html-to-docx@1.8.0/dist/html-to-docx.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 

    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
        .prose { max-width: 65ch; }
        .prose-sm { font-size: 0.875rem; line-height: 1.5; }
        .genie-logo { width: 5rem; height: 5rem; }
        @media (min-width: 768px) { .genie-logo { width: 12rem; height: 12rem; } }
        .quiz-question-wrapper.correct { border-left: 4px solid #22c55e; background-color: #f0fdf4; }
        .quiz-question-wrapper.incorrect { border-left: 4px solid #ef4444; background-color: #fef2f2; }
        .quiz-feedback { display: none; font-size: 0.875rem; font-weight: 500; margin-top: 0.75rem; }
        .quiz-question-wrapper.correct .quiz-feedback.correct { display: block; color: #166534; }
        .quiz-question-wrapper.incorrect .quiz-feedback.incorrect { display: block; color: #991b1b; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen">
        <div id="loading-spinner" class="flex items-center justify-center min-h-screen">
             <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600"></div>
        </div>
    </div>

    <div id="paywall-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop transition-opacity">
        <div id="paywall-content" class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center transform transition-transform scale-90"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            session: null, accountData: null, usageData: { count: 0, resetDate: null },
            activeProfile: null, activeTab: 'home', uploadedImageBase64: null,
            currentTest: null, myActivityData: []
        };

        // --- RESTORED CORE TEMPLATES (Including Image Uploads & Icons) ---
        function homePageTemplate() {
            return `
            <div class="max-w-4xl mx-auto text-center">
                 <div class="bg-white p-8 md:p-12 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <i data-lucide="sparkles" class="mx-auto h-16 w-16 text-amber-400"></i>
                    <h1 class="mt-4 text-4xl md:text-5xl font-bold text-gray-800">Welcome, ${state.activeProfile.name}!</h1>
                    <p class="mt-4 text-lg text-gray-600">Your AI-powered assistant for learning.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
                    <div data-nav-link="mathsMastery" class="group bg-white p-8 rounded-xl shadow-lg border-t-4 border-blue-500 cursor-pointer">
                        <i data-lucide="calculator" class="h-12 w-12 text-blue-600 mb-4 mx-auto"></i>
                        <h2 class="text-2xl font-bold">Maths Mastery</h2>
                        <p class="text-gray-600">Step-by-step math solver.</p>
                    </div>
                    <div data-nav-link="homeworkHelper" class="group bg-white p-8 rounded-xl shadow-lg border-t-4 border-rose-400 cursor-pointer">
                        <i data-lucide="life-buoy" class="h-12 w-12 text-rose-500 mb-4 mx-auto"></i>
                        <h2 class="text-2xl font-bold text-gray-800">Homework Helper</h2>
                        <p class="mt-2 text-gray-600">Hints for your worksheets (Upload photos!)</p>
                    </div>
                    <div data-nav-link="learningHub" class="group bg-white p-8 rounded-xl shadow-lg border-t-4 border-indigo-500 cursor-pointer">
                        <i data-lucide="book-marked" class="h-12 w-12 text-indigo-600 mb-4 mx-auto"></i>
                        <h2 class="text-2xl font-bold text-gray-800">Learning Hub</h2>
                        <p class="mt-2 text-gray-600">Revision notes and practice tests.</p>
                    </div>
                    <div data-nav-link="testBuilder" class="group bg-white p-8 rounded-xl shadow-lg border-t-4 border-teal-400 cursor-pointer">
                        <i data-lucide="clipboard-check" class="h-12 w-12 text-teal-500 mb-4 mx-auto"></i>
                        <h2 class="text-2xl font-bold text-gray-800">Test Builder</h2>
                        <p class="mt-2 text-gray-600">Create custom quizzes.</p>
                    </div>
                </div>
            </div>`;
        }

        // Template logic for all tools with image support restored
        function getToolLayout(title, color, icon, btnId, btnText, inputId, placeholder, extraFields = '') {
            return `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-${color}-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">${title}</h2>
                    <div class="space-y-6">
                        <textarea id="${inputId}" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-${color}-500" placeholder="${placeholder}"></textarea>
                        ${extraFields}
                        <div class="text-center text-sm font-medium text-gray-500">OR UPLOAD PHOTO</div>
                        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md cursor-pointer hover:bg-gray-50" onclick="document.getElementById('image-upload').click()">
                            <div class="space-y-1 text-center">
                                <i data-lucide="camera" class="mx-auto h-12 w-12 text-gray-400"></i>
                                <span class="text-indigo-600 font-medium">Upload Worksheet Photo</span>
                                <input id="image-upload" type="file" class="sr-only" accept="image/*" onchange="handleImageChange(event)">
                            </div>
                        </div>
                        <div id="image-preview-wrapper" class="hidden mt-4">
                            <img id="image-preview" class="rounded-lg max-h-64 mx-auto" />
                            <button onclick="handleRemoveImage()" class="mt-2 mx-auto flex items-center text-red-600 text-sm"><i data-lucide="x" class="h-4 w-4 mr-1"></i>Remove</button>
                        </div>
                    </div>
                    <button id="${btnId}" class="mt-8 w-full bg-${color}-600 text-white font-bold py-3 rounded-lg hover:bg-${color}-700 flex items-center justify-center"><i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>${btnText}</button>
                </div>
                <div id="tool-output" class="mt-8"></div>
            </div>`;
        }

        // --- RESTORED LOGIC WITH SEMANTIC FIXES ---
        async function fetchAI(prompt, isJson, imageData = null) {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, isJson, imageData })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function handleMathsMastery() {
            const input = document.getElementById('math-input').value;
            const output = document.getElementById('tool-output');
            const btn = document.getElementById('generate-math-btn');
            
            btn.disabled = true; btn.innerHTML = "Thinking...";
            try {
                const prompt = `Solve this math problem. Show your work step-by-step. Return JSON: {"steps": ["Step 1", "Step 2"], "final_answer": "Result"}. Problem: ${input || "See Image"}`;
                const res = JSON.parse(await fetchAI(prompt, true, state.uploadedImageBase64));
                output.innerHTML = `<div class="bg-white p-6 rounded shadow border-l-4 border-blue-500"><ol class="list-decimal ml-5 space-y-2 mb-4">${res.steps.map(s => `<li>${s}</li>`).join('')}</ol><div class="p-3 bg-blue-50 font-bold text-xl">Answer: ${res.final_answer}</div></div>`;
            } catch (e) { output.innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`; }
            btn.disabled = false; btn.innerHTML = "Solve Problem";
            lucide.createIcons();
        }

        async function submitTest() {
            const btn = document.getElementById('mark-btn');
            btn.disabled = true; btn.innerHTML = "AI is marking semantically...";
            
            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const userAns = q.type === 'MCQ' ? document.querySelector(`input[name="q${i}"]:checked`)?.value : document.querySelector(`input[name="q${i}"]`).value;

                // Semantic Fix implemented here
                const prompt = `Is this answer correct? Question: "${q.question}", Correct Answer: "${q.correct_answer}", Student Answer: "${userAns || 'None'}". Evaluate meaning, not exact wording. Return JSON: {"isCorrect": true/false, "feedback": "Explanation"}`;
                const res = JSON.parse(await fetchAI(prompt, true));
                
                block.className = `quiz-question-wrapper p-4 rounded-lg ${res.isCorrect ? 'correct' : 'incorrect'}`;
                block.querySelector('.quiz-feedback.incorrect').innerText = res.feedback;
            }
            btn.disabled = false; btn.innerHTML = "Check My Answers";
        }

        // --- UI BOILERPLATE (Profile Icons & Sidebar Restored) ---
        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="flex h-screen">
                    <aside class="w-64 bg-white border-r p-6 flex flex-col">
                        <div class="flex flex-col items-center mb-10"><img src="/logo.svg" class="h-16 w-16 mb-2"><h1 class="text-xl font-bold">Learning Genie</h1></div>
                        <nav class="flex-1 space-y-2">
                            <button data-nav-link="home" class="w-full flex items-center p-3 hover:bg-gray-100 rounded text-left"><i data-lucide="home" class="h-5 w-5 mr-3"></i>Dashboard</button>
                            <button data-nav-link="myActivity" class="w-full flex items-center p-3 hover:bg-gray-100 rounded text-left"><i data-lucide="history" class="h-5 w-5 mr-3"></i>History</button>
                        </nav>
                        <div class="flex items-center p-3 bg-indigo-50 rounded-lg mt-auto"><i data-lucide="user" class="h-6 w-6 text-indigo-600 mr-2"></i><span class="font-bold text-sm">${state.activeProfile.name}</span></div>
                    </aside>
                    <main id="main-content" class="flex-1 p-10 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const main = document.getElementById('main-content');
            if (state.activeTab === 'home') main.innerHTML = homePageTemplate();
            else if (state.activeTab === 'mathsMastery') {
                main.innerHTML = getToolLayout('Maths Mastery', 'blue', 'calculator', 'generate-math-btn', 'Solve Problem', 'math-input', 'Enter equation here...');
                document.getElementById('generate-math-btn').onclick = handleMathsMastery;
            }
            else if (state.activeTab === 'homeworkHelper') {
                main.innerHTML = getToolLayout('Homework Helper', 'rose', 'life-buoy', 'hh-btn', 'Get Help', 'hh-input', 'Enter your question...');
            }
            // Add other tool renders here...
            lucide.createIcons();
        }

        // --- AUTH & PROFILE PICKER (Restored Icons) ---
        function profilePickerTemplate(profiles) {
            const list = profiles.map(p => `<button onclick="selectProfile('${p.id}')" class="group flex flex-col items-center p-4 bg-white rounded-xl shadow-lg hover:bg-indigo-50 transition-all"><div class="h-24 w-24 rounded-full bg-indigo-200 flex items-center justify-center mb-4 group-hover:bg-indigo-300"><i data-lucide="user" class="h-12 w-12 text-indigo-700"></i></div><span class="font-bold text-gray-700">${p.name}</span></button>`).join('');
            return `<div class="min-h-screen flex flex-col items-center justify-center bg-indigo-50"><h1 class="text-3xl font-bold mb-10 text-gray-800">Who is learning today?</h1><div class="grid grid-cols-2 md:grid-cols-4 gap-8">${list}</div></div>`;
        }

        function selectProfile(id) {
            supabaseClient.from('profiles').select('*').eq('id', id).single().then(({data}) => {
                state.activeProfile = data; showMainApp();
            });
        }

        // INIT
        supabaseClient.auth.getSession().then(({data:{session}}) => {
            if (!session) window.location.href = '/login.html';
            else {
                state.session = session;
                supabaseClient.from('profiles').select('*').eq('account_id', session.user.id).then(({data}) => {
                    document.getElementById('app-container').innerHTML = profilePickerTemplate(data);
                    lucide.createIcons();
                });
            }
        });

        // Navigation listener
        document.addEventListener('click', (e) => {
            const nav = e.target.closest('[data-nav-link]');
            if (nav) { state.activeTab = nav.dataset.navLink; renderToolContent(); }
        });

        function handleImageChange(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.uploadedImageBase64 = ev.target.result.split(',')[1];
                document.getElementById('image-preview').src = ev.target.result;
                document.getElementById('image-preview-wrapper').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
