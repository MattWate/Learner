        const state = {

        function homePageTemplate() {
            return `
            <div class="max-w-4xl mx-auto text-center">
                 <div class="bg-white p-8 md:p-12 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <i data-lucide="sparkles" class="mx-auto h-16 w-16 text-amber-400"></i>
                    <h1 class="mt-4 text-4xl md:text-5xl font-bold text-gray-800">Welcome, ${state.activeProfile.name}!</h1>

                        <i data-lucide="book-marked" class="h-12 w-12 text-indigo-600 mb-4 mx-auto"></i>

                    </div>
                    <div data-nav-link="homeworkHelper" class="group bg-white p-8 rounded-xl shadow-lg hover:shadow-2xl transition-shadow duration-300 cursor-pointer border-t-4 border-rose-400">

                    <div data-nav-link="testBuilder" class="group bg-white p-8 rounded-xl shadow-lg hover:shadow-2xl transition-shadow duration-300 cursor-pointer border-t-4 border-teal-400">

                        <h2 class="text-2xl font-bold text-gray-800">Test Builder</h2>
                        <p class="mt-2 text-gray-600">Create a custom practice test on any topic.</p>

            </div>`;
        }

        const mathsMasteryTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-blue-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Maths Mastery</h2>
                    <p class="text-gray-500 mb-8">Enter a math problem or upload a photo of your equation.</p>
                    <div class="space-y-6">
                        <textarea id="math-problem" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500" placeholder="e.g. Solve for x: 2x + 5 = 15"></textarea>
                        <div class="text-center text-sm font-medium text-gray-500">OR UPLOAD PHOTO</div>
                        <input type="file" id="image-upload" class="hidden" accept="image/*">
                        <button onclick="document.getElementById('image-upload').click()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:bg-gray-50 flex flex-col items-center">
                            <i data-lucide="camera" class="h-8 w-8 mb-2"></i>
                            <span>Upload Equation Photo</span>
                        </button>
                        <div id="image-preview-wrapper" class="hidden mt-4">
                            <img id="image-preview" class="rounded-lg max-h-48 mx-auto" />
                            <button id="remove-image-btn" class="mt-2 mx-auto flex items-center text-sm text-red-600"><i data-lucide="x" class="h-4 w-4 mr-1"></i>Remove</button>
                        </div>
                    </div>
                    <button id="generate-math-btn" class="mt-8 w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Solve Problem
                    </button>
                    <div id="math-error" class="text-red-500 text-sm mt-2 hidden"></div>
                </div>
                <div id="math-output" class="mt-8"></div>
            </div>`;

        const homeworkHelperTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Homework Helper</h2>
                    <p class="text-gray-500 mb-8">Type your question or upload a photo of your worksheet.</p>
                    <textarea id="hh-question" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="e.g., What was the main cause of the French Revolution?"></textarea>
                    <button id="generate-homework-help-btn" class="mt-8 w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Get Help
                    </button>
                    <div id="hh-error" class="text-red-500 text-sm mt-2 hidden"></div>
                </div>
                <div id="hh-output" class="mt-8"></div>
            </div>`;

        const learningHubTemplate = `
             <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Learning Hub</h2>
                    <p class="text-gray-500 mb-8">Enter a topic to get revision notes and a practice test.</p>
                    <textarea id="learn-topic" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="e.g., The planets in our solar system"></textarea>
                    <button id="generate-learning-help-btn" class="mt-6 w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700 flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Help Me Learn
                    </button>
                    <div id="lh-error" class="text-red-500 text-sm mt-2 hidden"></div>
                </div>
                <div id="lh-output" class="mt-8"></div>
            </div>`;
            
        const testBuilderTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-teal-500">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">Test Builder</h2>
                    <p class="text-gray-500 mb-8">Create a custom practice test on any topic.</p>
                    <textarea id="tb-topic" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="e.g., World War 2 Key Battles"></textarea>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                        <select id="tb-num-questions" class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white">
                            <option value="5" selected>5 Questions</option>
                            <option value="10">10 Questions</option>
                        </select>
                        <div class="flex space-x-4 items-center">
                            <label><input type="checkbox" id="tb-qt-mcq" checked> MCQ</label>
                            <label><input type="checkbox" id="tb-qt-short" checked> Short Answer</label>
                        </div>
                    </div>
                    <button id="generate-test-builder-btn" class="w-full bg-teal-600 text-white font-bold py-3 px-4 rounded-lg mt-6 hover:bg-teal-700 flex items-center justify-center">
                        <i data-lucide="sparkles" class="w-5 h-5 mr-2"></i>Generate Test
                    </button>
                    <div id="tb-error" class="text-red-500 text-sm mt-2 hidden"></div>
                </div>
                <div id="tb-output" class="mt-8"></div>
            </div>`;

        // --- CORE UI FUNCTIONS ---

        function showMainApp() {
            const appContainer = document.getElementById('app-container');
            appContainer.innerHTML = `
                <div class="min-h-screen md:flex">
                    <aside id="sidebar" class="hidden md:flex w-full md:w-64 bg-white p-4 border-r border-gray-200 flex-col sticky top-0 h-screen">
                        <div class="flex flex-col items-center mb-8">
                            <img src="/logo.svg" class="h-12 w-12 mb-2">
                            <h1 class="text-xl font-bold">Learning Genie</h1>
                        </div>
                        <nav id="sidebar-nav" class="space-y-2 flex-1">
                             <button data-nav-link="home" class="nav-link flex items-center w-full px-4 py-3 rounded-lg"><i data-lucide="home" class="h-5 w-5 mr-3"></i>Home</button>
                             <button data-nav-link="mathsMastery" class="nav-link flex items-center w-full px-4 py-3 rounded-lg"><i data-lucide="calculator" class="h-5 w-5 mr-3"></i>Maths Mastery</button>
                             <button data-nav-link="learningHub" class="nav-link flex items-center w-full px-4 py-3 rounded-lg"><i data-lucide="book-marked" class="h-5 w-5 mr-3"></i>Learning Hub</button>
                             <button data-nav-link="homeworkHelper" class="nav-link flex items-center w-full px-4 py-3 rounded-lg"><i data-lucide="life-buoy" class="h-5 w-5 mr-3"></i>Homework Helper</button>
                             <button data-nav-link="testBuilder" class="nav-link flex items-center w-full px-4 py-3 rounded-lg"><i data-lucide="clipboard-check" class="h-5 w-5 mr-3"></i>Test Builder</button>
                        </nav>
                        <div id="usage-prompt-wrapper" class="mt-auto border-t pt-4"></div>
                    </aside>
                    <main id="main-content" class="flex-1 p-4 md:p-8 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const mainContent = document.getElementById('main-content');
            switch (state.activeTab) {
                case 'home': mainContent.innerHTML = homePageTemplate(); break;
                case 'mathsMastery': mainContent.innerHTML = mathsMasteryTemplate; break;
                case 'learningHub': mainContent.innerHTML = learningHubTemplate; break;
                case 'homeworkHelper': mainContent.innerHTML = homeworkHelperTemplate; break;
                case 'testBuilder': mainContent.innerHTML = testBuilderTemplate; break;
            }
            updateSidebar();
            attachToolEventListeners();
            lucide.createIcons();
        }

        function updateSidebar() {
            document.querySelectorAll('.nav-link').forEach(link => {
                const isActive = link.dataset.navLink === state.activeTab;
                link.className = `nav-link flex items-center w-full px-4 py-3 rounded-lg ${isActive ? 'bg-indigo-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`;
            });
        }

        function attachToolEventListeners() {
            const btnMap = {
                'generate-math-btn': handleMathsMastery,
                'generate-learning-help-btn': handleLearningHub,
                'generate-homework-help-btn': handleHomeworkHelper,
                'generate-test-builder-btn': handleTestBuilder
            };
            Object.entries(btnMap).forEach(([id, func]) => {
                const btn = document.getElementById(id);
                if (btn) btn.onclick = func;
            });
            
            const upload = document.getElementById('image-upload');
            if (upload) upload.onchange = handleImageChange;
            
            const remove = document.getElementById('remove-image-btn');
            if (remove) remove.onclick = handleRemoveImage;
        }

        // --- MATHS MASTERY LOGIC ---
        async function handleMathsMastery() {
            const problem = document.getElementById('math-problem').value;
            const output = document.getElementById('math-output');
            const btn = document.getElementById('generate-math-btn');
            
            if (!problem && !state.uploadedImageBase64) return;
            
            btn.disabled = true;
            btn.innerHTML = "Calculating...";
            output.innerHTML = "Thinking...";

            try {
                const prompt = `Solve this math problem. Show your work step-by-step. 
                Output a JSON object: {"steps": ["Step 1...", "Step 2..."], "final_answer": "Result"}`;
                const response = await fetchWithRetry(prompt, true, 1, 'text', state.uploadedImageBase64);
                const result = JSON.parse(response);
                
                output.innerHTML = `
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                        <h3 class="font-bold text-lg mb-4">Solution</h3>
                        <ol class="list-decimal ml-5 space-y-2 mb-4">${result.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                        <div class="p-3 bg-blue-50 rounded font-bold text-blue-800 text-xl">Answer: ${result.final_answer}</div>
                    </div>`;
            } catch (e) {
                output.innerHTML = "Error: " + e.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Solve Problem";
                lucide.createIcons();
            }
        }

        // --- UPDATED QUIZ CHECKING (AI-POWERED) ---
        async function handleQuizSubmit() {
            const submitBtn = document.getElementById('submit-quiz-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Checking with AI...";

            const checks = state.currentTest.map(async (q, i) => {
                const block = document.getElementById(`question-block-${i}`);
                let userAnswer = "";
                
                if (q.type === 'ShortAnswer') {
                    userAnswer = document.querySelector(`input[name="question_${i}"]`).value;
                } else {
                    const selected = document.querySelector(`input[name="question_${i}"]:checked`);
                    userAnswer = selected ? selected.value : "";
                }

                // AI Check for Semantic Accuracy
                const checkPrompt = `Compare the User Answer to the Correct Answer for accuracy. 
                User Answer: "${userAnswer}"
                Correct Answer: "${q.correct_answer}"
                Question: "${q.question}"
                Respond with a JSON object: {"isCorrect": true/false, "explanation": "Brief feedback"}`;
                
                try {
                    const response = await fetchWithRetry(checkPrompt, true);
                    const result = JSON.parse(response);
                    
                    block.className = `quiz-question-wrapper border-l-4 p-4 rounded-r-lg ${result.isCorrect ? 'correct' : 'incorrect'}`;
                    block.querySelector('.quiz-feedback.incorrect').innerHTML = result.explanation;
                } catch (e) {
                    // Fallback to string matching if API fails
                    const isCorrect = userAnswer.toLowerCase().trim() === q.correct_answer.toLowerCase().trim();
                    block.className = `quiz-question-wrapper border-l-4 p-4 rounded-r-lg ${isCorrect ? 'correct' : 'incorrect'}`;
                }
            });

            await Promise.all(checks);
            submitBtn.innerHTML = "Check My Answers";
            submitBtn.disabled = false;
        }

        // --- UTILS ---
        async function fetchWithRetry(prompt, isJson, retries = 1, requestType = 'text', imageData = null) {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, isJson, requestType, imageData })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "API Error");
            return data.candidates[0].content.parts[0].text;
        }

        function renderPracticeTest(testData) {
            let html = '<form id="quiz-form" class="space-y-6">';
            testData.forEach((q, i) => {
                html += `
                <div id="question-block-${i}" class="quiz-question-wrapper border-l-4 border-gray-200 p-4 rounded-r-lg bg-white shadow-sm">
                    <p class="font-semibold text-gray-800 mb-3">${i + 1}. ${q.question}</p>
                    ${q.type === 'ShortAnswer' ? 
                        `<input type="text" name="question_${i}" class="w-full p-2 border rounded" placeholder="Type answer...">` :
                        q.options.map(opt => `
                            <label class="block p-2 hover:bg-gray-50"><input type="radio" name="question_${i}" value="${opt}"> ${opt}</label>
                        `).join('')
                    }
                    <div class="quiz-feedback correct text-green-700 font-bold mt-2">Correct!</div>
                    <div class="quiz-feedback incorrect text-red-700 font-bold mt-2"></div>
                </div>`;
            });
            html += `<button id="submit-quiz-btn" type="button" onclick="handleQuizSubmit()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">Check My Answers</button></form>`;
            return html;
        }

        // (Remaining Auth/Account/Profile Picker Logic Kept from original)
        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = '/login.html'; }
            else { state.session = session; checkAccountStatus(session.user); }
        }

        async function checkAccountStatus(user) {
            const { data: profiles } = await supabaseClient.from('profiles').select('*').eq('account_id', user.id);
            if (profiles && profiles.length > 0) {
                const html = profiles.map(p => `<button onclick="selectProfile('${p.id}')" class="p-6 bg-white rounded-xl shadow hover:bg-indigo-50 font-bold">${p.name}</button>`).join('');
                document.getElementById('app-container').innerHTML = `<div class="min-h-screen flex items-center justify-center space-x-4">${html}</div>`;
            } else {
                // Simplified profile creation
                const name = prompt("Enter learner name:");
                const { data } = await supabaseClient.from('profiles').insert({ account_id: user.id, name }).select().single();
                state.activeProfile = data; showMainApp();
            }
        }

        function selectProfile(id) {
            supabaseClient.from('profiles').select('*').eq('id', id).single().then(({data}) => {
                state.activeProfile = data; showMainApp();
            });
        }

        function handleImageChange(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.uploadedImageBase64 = ev.target.result.split(',')[1];
                document.getElementById('image-preview').src = ev.target.result;
                document.getElementById('image-preview-wrapper').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        }
        function handleRemoveImage() {
            state.uploadedImageBase64 = null;
            document.getElementById('image-preview-wrapper').classList.add('hidden');
        }

        // Mock functions for missing handlers to prevent errors
        async function handleLearningHub() {
            const topic = document.getElementById('learn-topic').value;
            const output = document.getElementById('lh-output');
            output.innerHTML = "Generating...";
            const prompt = `Create a learning guide for ${topic}. Return JSON: {"notes": "Markdown string", "test": [{"question": "Text", "type": "ShortAnswer", "correct_answer": "Text"}]}`;
            const res = JSON.parse(await fetchWithRetry(prompt, true));
            state.currentTest = res.test;
            output.innerHTML = `<div class="prose max-w-none bg-white p-6 rounded shadow mb-6">${res.notes}</div>` + renderPracticeTest(res.test);
        }
        async function handleHomeworkHelper() { /* Placeholder */ }
        async function handleTestBuilder() { /* Placeholder */ }

        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
