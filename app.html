<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Genie - Learner Hub</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
        .quiz-question-wrapper { border-left: 4px solid #e5e7eb; transition: all 0.3s; }
        .quiz-question-wrapper.correct { border-left-color: #22c55e; background-color: #f0fdf4; }
        .quiz-question-wrapper.incorrect { border-left-color: #ef4444; background-color: #fef2f2; }
        .quiz-feedback { display: none; font-size: 0.875rem; margin-top: 0.75rem; font-weight: 500; }
        .correct .quiz-feedback.correct { display: block; color: #166534; }
        .incorrect .quiz-feedback.incorrect { display: block; color: #991b1b; }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen">
        <div id="loading-spinner" class="flex items-center justify-center min-h-screen">
             <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            session: null, accountData: null, activeProfile: null, activeTab: 'home',
            uploadedImageBase64: null, currentTest: null
        };

        // --- NAVIGATION ---
        document.addEventListener('click', (e) => {
            const navLink = e.target.closest('[data-nav-link]');
            if (navLink) {
                state.activeTab = navLink.dataset.navLink;
                renderToolContent();
            }
        });

        function renderToolContent() {
            const main = document.getElementById('main-content');
            if (!main) return;
            const templates = {
                home: homePageTemplate(),
                mathsMastery: mathsMasteryTemplate,
                learningHub: learningHubTemplate,
                homeworkHelper: homeworkHelperTemplate,
                explainSimply: explainSimplyTemplate,
                testBuilder: testBuilderTemplate,
                myActivity: myActivityTemplate()
            };
            main.innerHTML = templates[state.activeTab] || templates.home;
            if (state.activeTab === 'myActivity') loadActivity();
            lucide.createIcons();
        }

        // --- UI TEMPLATES ---
        function homePageTemplate() {
            return `
            <div class="max-w-4xl mx-auto text-center space-y-10">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h1 class="text-4xl font-bold text-gray-800">Hi ${state.activeProfile.name}!</h1>
                    <p class="mt-2 text-gray-600">Pick a tool to start learning.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${toolCard('mathsMastery', 'calculator', 'blue', 'Maths Mastery', 'Step-by-step math solver.')}
                    ${toolCard('learningHub', 'book-marked', 'indigo', 'Learning Hub', 'Notes & practice tests.')}
                    ${toolCard('homeworkHelper', 'life-buoy', 'rose', 'Homework Helper', 'Hints for your worksheets.')}
                    ${toolCard('explainSimply', 'baby', 'amber', 'Explain Simply', 'Complex topics made easy.')}
                    ${toolCard('testBuilder', 'clipboard-check', 'teal', 'Test Builder', 'Create custom quizzes.')}
                </div>
            </div>`;
        }

        function toolCard(id, icon, color, title, desc) {
            return `<div data-nav-link="${id}" class="bg-white p-6 rounded-xl shadow cursor-pointer border-t-4 border-${color}-500 hover:shadow-lg transition-all"><i data-lucide="${icon}" class="h-10 w-10 text-${color}-600 mb-4 mx-auto"></i><h3 class="text-xl font-bold">${title}</h3><p class="text-sm text-gray-500">${desc}</p></div>`;
        }

        const testBuilderTemplate = `
            <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-xl border-t-4 border-teal-500">
                <h2 class="text-2xl font-bold mb-4">Test Builder</h2>
                <div class="space-y-4">
                    <input id="tb-topic" class="w-full p-4 border rounded-lg" placeholder="Enter topic (e.g. Photosynthesis)">
                    <div class="flex space-x-4">
                        <select id="tb-count" class="flex-1 p-4 border rounded-lg bg-white"><option value="5">5 Questions</option><option value="10">10 Questions</option></select>
                        <div class="flex items-center space-x-2 px-2">
                            <label class="text-sm font-medium"><input type="checkbox" id="tb-mcq" checked> MCQ</label>
                            <label class="text-sm font-medium"><input type="checkbox" id="tb-short" checked> Short Answer</label>
                        </div>
                    </div>
                    <button onclick="handleTestBuilder()" id="tb-btn" class="w-full bg-teal-600 text-white font-bold py-3 rounded-lg">Generate Test</button>
                </div>
                <div id="tb-output" class="mt-8 space-y-6"></div>
            </div>`;

        // --- LOGIC ---
        async function fetchAI(prompt, isJson) {
            const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt, isJson }) });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function handleTestBuilder() {
            const topic = document.getElementById('tb-topic').value;
            const count = document.getElementById('tb-count').value;
            const output = document.getElementById('tb-output');
            const btn = document.getElementById('tb-btn');
            if (!topic) return;

            btn.disabled = true; btn.innerText = "Generating Quiz...";
            try {
                const prompt = `Create a ${count}-question test about ${topic}. Return JSON: {"test": [{"question": "...", "type": "MCQ/ShortAnswer", "options": ["A","B"], "correct_answer": "..."}]}`;
                const res = JSON.parse(await fetchAI(prompt, true));
                state.currentTest = res.test;

                output.innerHTML = res.test.map((q, i) => `
                    <div id="question-block-${i}" class="quiz-question-wrapper p-4 bg-gray-50 rounded-lg">
                        <p class="font-bold mb-3">${i+1}. ${q.question}</p>
                        ${q.type === 'MCQ' ? q.options.map(o => `<label class="block p-2"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`).join('') : `<input type="text" name="q${i}" class="w-full p-2 border rounded" placeholder="Your answer...">`}
                        <div class="quiz-feedback correct">Correct!</div>
                        <div class="quiz-feedback incorrect"></div>
                    </div>`).join('') + `<button onclick="submitTest()" id="mark-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg mt-4">Check My Answers</button>`;
                
                lucide.createIcons();
            } catch (e) { output.innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`; }
            btn.disabled = false; btn.innerText = "Generate Test";
        }

        async function submitTest() {
            const btn = document.getElementById('mark-btn');
            btn.disabled = true; btn.innerText = "Marking with AI...";
            
            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const userAns = q.type === 'MCQ' ? document.querySelector(`input[name="q${i}"]:checked`)?.value : document.querySelector(`input[name="q${i}"]`).value;

                const prompt = `Question: "${q.question}", Correct: "${q.correct_answer}", Student: "${userAns || 'No Answer'}". Is it semantically correct? Return JSON: {"isCorrect": true/false, "feedback": "Brief explanation"}`;
                const res = JSON.parse(await fetchAI(prompt, true));
                
                block.className = `quiz-question-wrapper p-4 rounded-lg ${res.isCorrect ? 'correct' : 'incorrect'}`;
                block.querySelector('.quiz-feedback.incorrect').innerText = res.feedback;
            }
            btn.disabled = false; btn.innerText = "Check My Answers";
        }

        // --- REST OF TOOLS & AUTH ---
        const mathsMasteryTemplate = `...`; // (Refer to previous complete templates)
        const learningHubTemplate = `...`;
        const homeworkHelperTemplate = `...`;
        const explainSimplyTemplate = `...`;
        function myActivityTemplate() { return `...`; }

        async function handleMathsMastery() { /* ... */ }
        async function handleLearningHub() { /* ... */ }
        async function handleExplainSimply() { /* ... */ }
        async function saveWork() { /* ... */ }
        async function loadActivity() { /* ... */ }

        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="flex h-screen">
                    <aside class="w-64 bg-white border-r p-6 space-y-2">
                        <button data-nav-link="home" class="w-full text-left p-2 hover:bg-gray-100 rounded">Dashboard</button>
                        <button data-nav-link="myActivity" class="w-full text-left p-2 hover:bg-gray-100 rounded">History</button>
                    </aside>
                    <main id="main-content" class="flex-1 p-10 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        supabaseClient.auth.getSession().then(({data:{session}}) => {
            if(!session) window.location.href='/login.html';
            else {
                state.session = session;
                supabaseClient.from('profiles').select('*').eq('account_id', session.user.id).limit(1).single().then(({data}) => {
                    if(data){ state.activeProfile=data; showMainApp(); }
                    else window.location.href='/login.html';
                });
            }
        });
    </script>
</body>
</html>
