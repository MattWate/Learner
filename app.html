<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Genie - Learner Hub</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/html-to-docx@1.8.0/dist/html-to-docx.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script> 

    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom, rgb(238 242 255), #f8fafc); min-height: 100vh; }
        .prose { max-width: 65ch; }
        .prose-sm { font-size: 0.875rem; line-height: 1.5; }
        .genie-logo { width: 5rem; height: 5rem; }
        @media (min-width: 768px) { .genie-logo { width: 12rem; height: 12rem; } }
        .quiz-question-wrapper.correct { border-left-color: #22c55e; background-color: #f0fdf4; }
        .quiz-question-wrapper.incorrect { border-left-color: #ef4444; background-color: #fef2f2; }
        .quiz-feedback { display: none; font-size: 0.875rem; font-weight: 500; margin-top: 0.75rem; }
        .quiz-question-wrapper.correct .quiz-feedback.correct { display: block; color: #166534; }
        .quiz-question-wrapper.incorrect .quiz-feedback.incorrect { display: block; color: #991b1b; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.7); }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen">
        <div id="loading-spinner" class="flex items-center justify-center min-h-screen">
             <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-600"></div>
        </div>
    </div>

    <div id="paywall-modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-backdrop transition-opacity">
        <div id="paywall-content" class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center transform transition-transform scale-90"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://yvoemqckgtmedfjudkzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2b2VtcWNrZ3RtZWRmanVka3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA4Mjk3ODYsImV4cCI6MjA3NjQwNTc4Nn0.tbbJT2QWg_Cpl0_FbfVxyZl1Fsord1LQKJztyGQloJo';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = {
            session: null, accountData: null, usageData: { count: 0, resetDate: null },
            activeProfile: null, activeTab: 'home', uploadedImageBase64: null,
            currentTest: null, myActivityData: []
        };

        // --- TEMPLATES ---
        function homePageTemplate() {
            return `
            <div class="max-w-4xl mx-auto text-center">
                <div class="bg-white p-8 md:p-12 rounded-xl shadow-xl border-t-4 border-indigo-500">
                    <h1 class="text-4xl font-bold text-gray-800">Welcome, ${state.activeProfile.name}!</h1>
                    <p class="mt-4 text-gray-600">What would you like to learn today?</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
                    <div data-nav-link="mathsMastery" class="group bg-white p-8 rounded-xl shadow hover:shadow-lg transition-all border-t-4 border-blue-500 cursor-pointer">
                        <i data-lucide="calculator" class="h-12 w-12 text-blue-600 mb-4 mx-auto"></i>
                        <h2 class="text-2xl font-bold">Maths Mastery</h2>
                        <p class="text-gray-600">Step-by-step math help.</p>
                    </div>
                    <div data-nav-link="learningHub" class="group bg-white p-8 rounded-xl shadow hover:shadow-lg transition-all border-t-4 border-indigo-500 cursor-pointer">
                        <i data-lucide="book-marked" class="h-12 w-12 text-indigo-600 mb-4 mx-auto"></i>
                        <h2 class="text-2xl font-bold">Learning Hub</h2>
                        <p class="text-gray-600">Revision notes & tests.</p>
                    </div>
                </div>
            </div>`;
        }

        const mathsMasteryTemplate = `
            <div class="max-w-4xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-xl border-t-4 border-blue-500">
                    <h2 class="text-3xl font-bold mb-2">Maths Mastery</h2>
                    <textarea id="math-problem" rows="3" class="w-full p-4 border rounded-lg mb-4" placeholder="Enter math equation..."></textarea>
                    <input type="file" id="image-upload" class="hidden" accept="image/*" onchange="handleImageChange(event)">
                    <button onclick="document.getElementById('image-upload').click()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 mb-4">Upload Equation Photo</button>
                    <div id="image-preview-wrapper" class="hidden mb-4"><img id="image-preview" class="max-h-48 mx-auto rounded shadow"></div>
                    <button id="generate-math-btn" onclick="handleMathsMastery()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">Solve Problem</button>
                </div>
                <div id="math-output" class="mt-8"></div>
            </div>`;

        function myActivityTemplate() {
            const isFree = state.accountData?.active_tier === 'free';
            if (isFree) return `<div class="text-center p-8 bg-white rounded shadow">Upgrade to unlock activity history.</div>`;
            return `<div class="max-w-4xl mx-auto"><div class="bg-white p-8 rounded shadow mb-6"><h2 class="text-2xl font-bold">Activity History</h2></div><div id="activity-list" class="space-y-4">Loading...</div></div>`;
        }

        // --- LOGIC ---
        async function handleMathsMastery() {
            const problem = document.getElementById('math-problem').value;
            const output = document.getElementById('math-output');
            const btn = document.getElementById('generate-math-btn');
            if (!problem && !state.uploadedImageBase64) return;
            
            btn.disabled = true; btn.innerHTML = "Thinking...";
            try {
                const prompt = `Solve this math problem. Show your work step-by-step. Return JSON: {"steps": ["Step 1", "Step 2"], "final_answer": "Result"}`;
                const res = JSON.parse(await fetchAI(prompt, true, state.uploadedImageBase64));
                
                await supabaseClient.from('saved_work').insert({
                    profile_id: state.activeProfile.id,
                    work_type: 'mathsMastery',
                    input_prompt: { prompt: problem || "Image Problem" },
                    output_content: res
                });

                output.innerHTML = `<div class="bg-white p-6 rounded shadow border-l-4 border-blue-500">
                    <ol class="list-decimal ml-5 mb-4">${res.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                    <div class="p-3 bg-blue-50 font-bold text-xl">Answer: ${res.final_answer}</div>
                </div>`;
            } catch (e) { output.innerHTML = "Error: " + e.message; }
            btn.disabled = false; btn.innerHTML = "Solve Problem";
        }

        async function fetchAI(prompt, isJson, imageData = null) {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, isJson, imageData })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function loadActivity() {
            const { data } = await supabaseClient.from('saved_work').select('*').eq('profile_id', state.activeProfile.id).order('created_at', { ascending: false });
            const list = document.getElementById('activity-list');
            if (!list) return;
            if (!data || data.length === 0) { list.innerHTML = "No activity yet."; return; }
            list.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded shadow flex justify-between">
                    <div><strong>${item.work_type}</strong>: ${item.input_prompt.prompt}</div>
                    <div class="text-gray-400 text-sm">${new Date(item.created_at).toLocaleDateString()}</div>
                </div>`).join('');
        }

        function showMainApp() {
            document.getElementById('app-container').innerHTML = `
                <div class="flex h-screen">
                    <aside class="w-64 bg-white border-r p-4 flex flex-col">
                        <nav class="flex-1 space-y-2">
                            <button data-nav-link="home" class="w-full text-left p-2 hover:bg-gray-100 rounded">Home</button>
                            <button data-nav-link="mathsMastery" class="w-full text-left p-2 hover:bg-gray-100 rounded">Maths Mastery</button>
                            <button data-nav-link="myActivity" class="w-full text-left p-2 hover:bg-gray-100 rounded">My Activity</button>
                        </nav>
                    </aside>
                    <main id="main-content" class="flex-1 p-8 overflow-y-auto"></main>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const main = document.getElementById('main-content');
            if (!main) return;
            if (state.activeTab === 'home') main.innerHTML = homePageTemplate();
            else if (state.activeTab === 'mathsMastery') main.innerHTML = mathsMasteryTemplate;
            else if (state.activeTab === 'myActivity') { main.innerHTML = myActivityTemplate(); loadActivity(); }
            lucide.createIcons();
        }

        // --- GLOBAL CLICK LISTENER ---
        document.addEventListener('click', (e) => {
            const navLink = e.target.closest('[data-nav-link]');
            if (navLink) {
                state.activeTab = navLink.dataset.navLink;
                renderToolContent();
            }
        });

        // --- INIT ---
        supabaseClient.auth.getSession().then(({data}) => {
            if (!data.session) window.location.href = '/login.html';
            else {
                state.session = data.session;
                supabaseClient.from('accounts').select('*').eq('id', data.session.user.id).single().then(({data: acc}) => {
                    state.accountData = acc;
                    supabaseClient.from('profiles').select('*').eq('account_id', state.session.user.id).then(({data: prfs}) => {
                        if (prfs && prfs.length > 0) { state.activeProfile = prfs[0]; showMainApp(); }
                        else { alert("Please create a profile first."); window.location.href='/login.html'; }
                    });
                });
            }
        });

        function handleImageChange(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.uploadedImageBase64 = ev.target.result.split(',')[1];
                document.getElementById('image-preview').src = ev.target.result;
                document.getElementById('image-preview-wrapper').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    </script>
</body>
</html>
