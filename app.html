        // --- UTILITY FUNCTIONS ---
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function renderPracticeTest(testData) {
            if (!testData || testData.length === 0) return "<p>No test data.</p>";
            let html = '<form id="quiz-form" class="space-y-6">';
            testData.forEach((question, index) => {
                html += `<div id="question-block-${index}" class="quiz-question-wrapper border-l-4 border-gray-200 p-4 rounded-r-lg bg-white shadow-sm mb-4">`;
                html += `<p class="font-semibold text-gray-800 mb-3">${index + 1}. ${question.question}</p>`;
                html += `<div class="space-y-2">`;
                if (question.type === 'MCQ' || question.type === 'TrueFalse') {
                    if(question.options) shuffleArray(question.options);
                    question.options.forEach((option) => {
                        html += `<label class="flex items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer transition"><input type="radio" name="question_${index}" value="${option}" class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500"><span class="ml-3 text-sm text-gray-700">${option}</span></label>`;
                    });
                } else if (question.type === 'ShortAnswer') {
                    html += `<input type="text" name="question_${index}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500" placeholder="Type your answer here...">`;
                }
                html += `</div><div class="quiz-feedback-explanation text-xs italic mt-2 text-indigo-600 hidden"></div></div>`;
            });
            html += `<button id="submit-quiz-btn" type="submit" class="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-700 flex items-center justify-center disabled:bg-green-300">Check My Answers</button></form>`;
            return html;
        }

        function createSectionHTML(icon, color, title, content) {
            const clean = (text) => String(text).replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            return `<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-4"><h3 class="text-lg font-semibold text-gray-800 flex items-center mb-3"><i data-lucide="${icon}" class="text-${color}-500 mr-2"></i>${title}</h3><div class="prose prose-sm max-w-none text-gray-600">${clean(content)}</div></div>`;
        }

        // --- CORE APP RENDER FUNCTION ---
        function showMainApp() {
            const appContainer = document.getElementById('app-container');
            appContainer.innerHTML = `
                <div class="min-h-screen md:flex">
                    <aside id="sidebar" class="w-64 bg-white border-r p-4 hidden md:flex flex-col h-screen sticky top-0">
                        <div data-nav-link="home" class="mb-8 text-center cursor-pointer group"><img src="/logo.svg" class="h-16 mx-auto group-hover:scale-110 transition"><h1 class="font-bold text-gray-800 mt-2 text-xl text-center">Learning Genie</h1></div>
                        <nav id="sidebar-nav" class="space-y-2 flex-1"></nav>
                        <div id="usage-prompt-wrapper" class="mt-auto border-t pt-4"></div>
                        <div class="pt-2 border-t mt-4">
                            <button id="logout-btn" class="w-full flex items-center px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg"><i data-lucide="log-out" class="w-4 h-4 mr-2"></i>Logout</button>
                        </div>
                    </aside>
                    <div class="flex-1 flex flex-col min-w-0">
                        <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-40">
                            <div class="flex items-center cursor-pointer" data-nav-link="home"><img src="/logo.svg" alt="Logo" class="h-8 w-8 mr-2"><span class="font-bold text-lg text-gray-800">Learning Genie</span></div>
                            <button id="menu-toggle-btn" class="p-2 text-gray-600 rounded-lg hover:bg-gray-100"><i data-lucide="menu" class="h-6 w-6"></i></button>
                        </header>
                        <main id="main-content" class="flex-1 p-4 md:p-8 bg-slate-50 overflow-y-auto"></main>
                    </div>
                </div>`;
            renderToolContent();
        }

        function renderToolContent() {
            const mainContent = document.getElementById('main-content');
            if (!mainContent) return;
            switch (state.activeTab) {
                case 'home': mainContent.innerHTML = homePageTemplate(); break;
                case 'homeworkHelper': mainContent.innerHTML = homeworkHelperTemplate; break;
                case 'learningHub': mainContent.innerHTML = learningHubTemplate; break;
                case 'explainSimply': mainContent.innerHTML = explainSimplyTemplate; break;
                case 'testBuilder': mainContent.innerHTML = testBuilderTemplate; break;
                case 'mathHub': mainContent.innerHTML = mathHubTemplate; break;
                case 'myActivity': mainContent.innerHTML = myActivityTemplate(); break;
                case 'upgrade': mainContent.innerHTML = upgradeTemplate(); break;
                default: mainContent.innerHTML = homePageTemplate();
            }
            updateSidebar();
            lucide.createIcons();
            attachToolEventListeners();
            if (state.activeTab === 'myActivity') loadMyActivity();
        }

        function updateSidebar() {
            const nav = document.getElementById('sidebar-nav');
            const usage = document.getElementById('usage-prompt-wrapper');
            if (!nav || !usage) return;
            const tabs = [
                { id: 'home', icon: 'home', label: 'Home' },
                { id: 'learningHub', icon: 'book-marked', label: 'Learning Hub' },
                { id: 'homeworkHelper', icon: 'life-buoy', label: 'Homework Help' },
                { id: 'explainSimply', icon: 'baby', label: 'Explain Simply' },
                { id: 'mathHub', icon: 'calculator', label: 'Math Hub' },
                { id: 'testBuilder', icon: 'clipboard-check', label: 'Test Builder' },
                { id: 'myActivity', icon: 'history', label: 'My Activity' }
            ];
            nav.innerHTML = tabs.map(t => `<button data-nav-link="${t.id}" class="flex items-center w-full px-4 py-2 rounded-lg ${state.activeTab === t.id ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'} capitalize mb-1 transition-all"><i data-lucide="${t.icon}" class="w-5 h-5 mr-3"></i>${t.label}</button>`).join('');
            const isFree = state.accountData?.active_tier === 'free';
            if (isFree) {
                const remaining = FREE_USAGE_LIMIT - state.usageData.count;
                usage.innerHTML = `<div class="p-3 bg-indigo-50 rounded-lg text-center border border-indigo-100"><p class="text-xs font-bold text-indigo-700">Trial: ${remaining}/${FREE_USAGE_LIMIT} Left</p></div>`;
            } else {
                usage.innerHTML = `<div class="p-3 bg-green-50 rounded-lg text-center font-bold text-green-700 text-xs border border-green-100 italic">UNLIMITED ACTIVE</div>`;
            }
        }

        // --- CORE LOGIC FUNCTIONS ---

        async function fetchWithRetry(prompt, isJson, retries = 1, requestType = 'text', imageData = null) {
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, isJson, requestType, imageData })
                });
                const result = await response.json();
                return result.candidates[0].content.parts[0].text;
            } catch (error) {
                if (retries > 0) return fetchWithRetry(prompt, isJson, retries - 1, requestType, imageData);
                throw error;
            }
        }

        async function handleQuizSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-quiz-btn');
            btn.disabled = true; btn.innerHTML = "Marking with AI...";
            let score = 0;
            for (let i = 0; i < state.currentTest.length; i++) {
                const q = state.currentTest[i];
                const block = document.getElementById(`question-block-${i}`);
                const fb = block.querySelector('.quiz-feedback-explanation');
                const userVal = q.type === 'ShortAnswer' ? document.querySelector(`[name="question_${i}"]`).value.trim() : document.querySelector(`[name="question_${i}"]:checked`)?.value;
                let isCorrect = false;
                if (q.type !== 'ShortAnswer') { isCorrect = userVal === q.correct_answer; }
                else if (userVal) {
                    const prompt = `Grade: Q:"${q.question}" Ans:"${q.correct_answer}" Student:"${userVal}". JSON:{"isCorrect":true,"explanation":""}`;
                    try {
                        const res = JSON.parse(await fetchWithRetry(prompt, true));
                        isCorrect = res.isCorrect;
                        if(fb) { fb.innerText = res.explanation || ""; fb.classList.remove('hidden'); }
                    } catch (e) { isCorrect = userVal.toLowerCase() === q.correct_answer.toLowerCase(); }
                }
                block.className = `quiz-question-wrapper border-l-4 p-6 rounded-r-lg mb-4 ${isCorrect ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'}`;
                if(isCorrect) score++;
            }
            btn.innerHTML = `Finished! Score: ${score}/${state.currentTest.length}`;
            lucide.createIcons();
        }

        async function handleGenerateLearningHelp() {
            const topic = document.getElementById('learn-topic').value;
            const out = document.getElementById('lh-output');
            if(!topic) return;
            out.innerHTML = `<div class="text-center p-8"><div class="animate-spin h-12 w-12 border-b-2 border-indigo-600 mx-auto rounded-full"></div></div>`;
            try {
                const prompt = `Topic: "${topic}". JSON keys: "learning_objectives", "revision_notes", "practice_test" (5 items with question, type, options, correct_answer).`;
                const data = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = data.practice_test;
                out.innerHTML = createSectionHTML('check', 'green', 'Objectives', data.learning_objectives) + createSectionHTML('book', 'indigo', 'Notes', data.revision_notes) + renderPracticeTest(data.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form').addEventListener('submit', handleQuizSubmit);
            } catch(e) { out.innerHTML = "Error."; }
        }

        async function handleGenerateHomeworkHelp() {
            const q = document.getElementById('hh-question').value;
            const out = document.getElementById('hh-output');
            out.innerHTML = "Analyzing...";
            try {
                const prompt = `HW Help: "${q}". JSON: {"hints": [], "answer": ""}`;
                const data = JSON.parse(await fetchWithRetry(prompt, true, 1, 'text', state.uploadedImageBase64));
                out.innerHTML = createSectionHTML('lightbulb', 'yellow', 'Hints', data.hints.join('<br>')) + createSectionHTML('key', 'green', 'Answer', data.answer);
                lucide.createIcons();
            } catch(e) { out.innerHTML = "Error."; }
        }

        function attachToolEventListeners() {
            document.getElementById('generate-learning-help-btn')?.addEventListener('click', handleGenerateLearningHelp);
            document.getElementById('generate-homework-help-btn')?.addEventListener('click', handleGenerateHomeworkHelp);
            document.getElementById('generate-explanation-btn')?.addEventListener('click', async () => {
                const topic = document.getElementById('explain-topic').value;
                document.getElementById('es-output').innerHTML = "Thinking...";
                const res = await fetchWithRetry(`Explain ${topic} simply.`, false);
                document.getElementById('es-output').innerHTML = createSectionHTML('baby', 'amber', 'Simple Explanation', res);
                lucide.createIcons();
            });
            document.getElementById('generate-test-builder-btn')?.addEventListener('click', async () => {
                const topic = document.getElementById('tb-topic').value;
                const num = document.getElementById('tb-num-questions').value;
                const prompt = `Create ${num}-question test on ${topic}. JSON: {"practice_test": []}`;
                const res = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = res.practice_test;
                document.getElementById('tb-output').innerHTML = renderPracticeTest(res.practice_test);
                lucide.createIcons();
                document.getElementById('quiz-form').addEventListener('submit', handleQuizSubmit);
            });
            document.getElementById('image-upload')?.addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.uploadedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview-wrapper').classList.remove('hidden');
                };
                reader.readAsDataURL(e.target.files[0]);
            });
            document.getElementById('logout-btn')?.addEventListener('click', () => supabaseClient.auth.signOut());
        }

        async function handleAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) window.location.href = '/login.html';
            else { 
                state.session = session;
                const { data: account } = await supabaseClient.from('accounts').select('*').eq('id', session.user.id).single();
                state.accountData = account || { active_tier: 'free' };
                const { data: usage } = await supabaseClient.from('monthly_usage').select('*').eq('account_id', session.user.id).single();
                state.usageData = { count: usage?.usage_count || 0 };
                const { data: profiles } = await supabaseClient.from('profiles').select('*').eq('account_id', session.user.id);
                state.activeProfile = profiles?.[0];
                showMainApp();
            }
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('[data-nav-link]');
            if (link) { state.activeTab = link.dataset.navLink; renderToolContent(); }
        });
        document.addEventListener("DOMContentLoaded", handleAuth);
    </script>
</body>
</html>
